# =========================================
# SSL Common Configuration
# =========================================
# This file contains shared SSL settings that can be included
# in multiple VirtualHost configurations.
#
# Usage: Include conf-available/ssl-common.conf
#
# Installation:
#   sudo cp ssl-common.conf /etc/apache2/conf-available/
#   sudo a2enconf ssl-common
#
# IMPORTANT: Adjust the certificate paths to match your setup!
# =========================================

SSLEngine on

# Let's Encrypt Wildcard Certificate (adjust domain!)
SSLCertificateFile /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem

# Modern SSL Configuration (Mozilla Intermediate)
SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
SSLHonorCipherOrder off
SSLSessionTickets off

# OCSP Stapling
SSLUseStapling on
SSLStaplingResponderTimeout 5
SSLStaplingReturnResponderErrors off
