<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1152" width="2048" height="1152" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L12,6 z" fill="#f97316"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f97316" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="2048" height="1152" fill="#090909"/>
  <rect x="28" y="28" width="1992" height="1096" rx="26" fill="#0f0f0f" stroke="#f97316" stroke-width="3"/>
  <text x="1024" y="82" text-anchor="middle" fill="#f97316" font-size="38" font-weight="800">solr-moodle-docker Installation</text>
  <text x="1024" y="122" text-anchor="middle" fill="#a8a29e" font-size="22">Frischer Docker Stack ohne Repository-URL im Diagramm</text>
  <line x1="80" y1="150" x2="1968" y2="150" stroke="#f97316" stroke-width="2" opacity="0.45"/>
  <rect x="80" y="220" width="330" height="520" rx="18" fill="#151515" stroke="#f97316" stroke-width="3" filter="url(#glow)"/>
  <text x="245" y="264" text-anchor="middle" fill="#fdba74" font-size="25" font-weight="800">1 Vorbereitung</text>
  <line x1="104" y1="282" x2="386" y2="282" stroke="#f97316" stroke-width="2" opacity="0.35"/>
  <text x="114" y="324" fill="#fed7aa" font-size="21">Arbeitsverzeichnis wählen</text>
  <text x="114" y="360" fill="#fed7aa" font-size="21">.env aus Vorlage erstellen</text>
  <text x="114" y="396" fill="#fed7aa" font-size="21">INSTANCE_NAME setzen</text>
  <text x="114" y="432" fill="#fed7aa" font-size="21">SOLR_MODE wählen</text>
  <text x="114" y="468" fill="#fed7aa" font-size="21">tenants.env vorbereiten</text>
  <text x="114" y="504" fill="#fed7aa" font-size="21">Dateirechte prüfen</text>
  <rect x="505" y="220" width="330" height="520" rx="18" fill="#151515" stroke="#f97316" stroke-width="3" filter="url(#glow)"/>
  <text x="670" y="264" text-anchor="middle" fill="#fdba74" font-size="25" font-weight="800">2 Build</text>
  <line x1="529" y1="282" x2="811" y2="282" stroke="#f97316" stroke-width="2" opacity="0.35"/>
  <text x="539" y="324" fill="#fed7aa" font-size="21">docker compose build</text>
  <text x="539" y="360" fill="#fed7aa" font-size="21">Solr Runtime Image</text>
  <text x="539" y="396" fill="#fed7aa" font-size="21">eLeDia Init Image</text>
  <text x="539" y="432" fill="#fed7aa" font-size="21">Helper Scripts im Image</text>
  <text x="539" y="468" fill="#fed7aa" font-size="21">Configset im Image</text>
  <rect x="930" y="220" width="330" height="520" rx="18" fill="#151515" stroke="#f97316" stroke-width="3" filter="url(#glow)"/>
  <text x="1095" y="264" text-anchor="middle" fill="#fdba74" font-size="25" font-weight="800">3 Start</text>
  <line x1="954" y1="282" x2="1236" y2="282" stroke="#f97316" stroke-width="2" opacity="0.35"/>
  <text x="964" y="324" fill="#fed7aa" font-size="21">docker compose up -d</text>
  <text x="964" y="360" fill="#fed7aa" font-size="21">Init schreibt Config</text>
  <text x="964" y="396" fill="#fed7aa" font-size="21">Solr startet als UID 8983</text>
  <text x="964" y="432" fill="#fed7aa" font-size="21">Healthcheck auf 8983</text>
  <text x="964" y="468" fill="#fed7aa" font-size="21">Logs nach ELEDIA_LOG_ROOT</text>
  <rect x="1355" y="220" width="330" height="520" rx="18" fill="#151515" stroke="#f97316" stroke-width="3" filter="url(#glow)"/>
  <text x="1520" y="264" text-anchor="middle" fill="#fdba74" font-size="25" font-weight="800">4 Tenant</text>
  <line x1="1379" y1="282" x2="1661" y2="282" stroke="#f97316" stroke-width="2" opacity="0.35"/>
  <text x="1389" y="324" fill="#fed7aa" font-size="21">solr-tenant.sh apply</text>
  <text x="1389" y="360" fill="#fed7aa" font-size="21">User und Rollen</text>
  <text x="1389" y="396" fill="#fed7aa" font-size="21">Collections oder Cores</text>
  <text x="1389" y="432" fill="#fed7aa" font-size="21">ACL Rebuild</text>
  <text x="1389" y="468" fill="#fed7aa" font-size="21">Fallback all zuletzt</text>
  <rect x="640" y="820" width="760" height="190" rx="18" fill="#151515" stroke="#f97316" stroke-width="3" filter="url(#glow)"/>
  <text x="1020" y="864" text-anchor="middle" fill="#fdba74" font-size="25" font-weight="800">5 Validierung</text>
  <line x1="664" y1="882" x2="1376" y2="882" stroke="#f97316" stroke-width="2" opacity="0.35"/>
  <text x="674" y="924" fill="#fed7aa" font-size="21">/admin/ping, /select, /update, /update/extract, /schema</text>
  <text x="674" y="960" fill="#fed7aa" font-size="21">Moodle Schema Setup</text>
  <text x="674" y="996" fill="#fed7aa" font-size="21">Moodle Search Index Task</text>
  <text x="674" y="1032" fill="#fed7aa" font-size="21">Solr Query beweist Dokumente im Index</text>
  <line x1="410" y1="480" x2="505" y2="480" stroke="#f97316" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="835" y1="480" x2="930" y2="480" stroke="#f97316" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1260" y1="480" x2="1355" y2="480" stroke="#f97316" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1520" y1="740" x2="1320" y2="820" stroke="#f97316" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1420" y="766" text-anchor="middle" fill="#a8a29e" font-size="18">Moodle E2E</text>
  <line x1="760" y1="740" x2="840" y2="820" stroke="#f97316" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="800" y="766" text-anchor="middle" fill="#a8a29e" font-size="18">Endpoint Tests</text>
  <text x="1024" y="1065" text-anchor="middle" fill="#78716c" font-size="18">Installationsziel: reproduzierbarer Stack mit Image-basierten Runtime-Helpern und prüfbarer Moodle-Kompatibilität.</text>
</svg>
