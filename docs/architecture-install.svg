<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Installation und Bootstrap des eLeDia Solr Moodle Stacks">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#262626" stroke-width="0.7"/></pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <style>
      .bg{fill:#0a0a0a}.title{font:700 28px Arial,sans-serif;fill:#fdba74}.sub{font:400 14px Arial,sans-serif;fill:#a8a29e}.section{font:700 17px Arial,sans-serif;fill:#fed7aa}.label{font:700 15px Arial,sans-serif;fill:#fed7aa}.small{font:400 12px Arial,sans-serif;fill:#e7e5e4}.tiny{font:400 10.5px Arial,sans-serif;fill:#a8a29e}.code{font:400 12px 'Courier New',monospace;fill:#e5e7eb}.codehi{font:700 12px 'Courier New',monospace;fill:#fdba74}.ok{font:700 12px Arial,sans-serif;fill:#86efac}.warn{font:700 12px Arial,sans-serif;fill:#fb7185}
      .box{fill:#171717;stroke:#f97316;stroke-width:1.8;rx:14}.cfg{fill:#111827;stroke:#fb923c;stroke-width:1.6;rx:14}.cli{fill:#0f172a;stroke:#38bdf8;stroke-width:1.7;rx:14}.guard{fill:#1f1111;stroke:#fb7185;stroke-width:1.7;rx:14}.store{fill:#0e0e0e;stroke:#c2410c;stroke-width:1.6}.panel{fill:#101010;stroke:#7c2d12;stroke-width:1.4;stroke-dasharray:8 6;rx:18}.legend{fill:#0f0f0f;stroke:#44403c;stroke-width:1.2;rx:12}
      .arrow{stroke:#f97316;stroke-width:2.2;fill:none;marker-end:url(#arr)}.blue{stroke:#38bdf8;stroke-width:2;fill:none;marker-end:url(#arrBlue)}
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/><rect width="1400" height="900" fill="url(#grid)" opacity="0.55"/>
  <text x="36" y="46" class="title">Installation und Bootstrap</text>
  <text x="36" y="72" class="sub">Setup erzeugt Konfiguration, Init baut Security und Configsets, danach startet die Solr Runtime.</text>

  <rect x="36" y="110" width="1328" height="210" class="panel"/>
  <text x="60" y="142" class="section">Startpfad</text>
  <rect x="70" y="178" width="185" height="90" class="cfg"/><text x="94" y="212" class="label">1. Konfiguration</text><text x="94" y="236" class="small">.env + tenants.env</text><text x="94" y="256" class="small">eLeDia-config/</text>
  <rect x="310" y="178" width="185" height="90" class="cli"/><text x="334" y="212" class="label">2. Start</text><text x="334" y="236" class="code">./setup.sh</text><text x="334" y="256" class="code">docker compose up</text>
  <rect x="550" y="178" width="210" height="90" class="box"/><text x="574" y="212" class="label">3. Init</text><text x="574" y="236" class="small">Security + Configsets</text><text x="574" y="256" class="small">Ping-Healthcheck</text>
  <rect x="815" y="178" width="190" height="90" class="box"/><text x="839" y="212" class="label">4. Solr Runtime</text><text x="839" y="236" class="small">AuthN/AuthZ aktiv</text><text x="839" y="256" class="small">Tika verfügbar</text>
  <rect x="1060" y="178" width="220" height="90" class="cli"/><text x="1084" y="212" class="label">5. Betrieb</text><text x="1084" y="236" class="small">Tenant-CLI</text><text x="1084" y="256" class="small">Moodle + Proxy</text>
  <path d="M255 223H305" class="arrow"/><path d="M495 223H545" class="arrow"/><path d="M760 223H810" class="arrow"/><path d="M1005 223H1055" class="arrow"/>

  <rect x="36" y="360" width="395" height="250" class="cli"/>
  <text x="60" y="394" class="section">Setup-Befehle</text>
  <text x="70" y="432" class="codehi">Empfohlen</text><text x="70" y="454" class="code">./setup.sh</text>
  <text x="70" y="492" class="codehi">Manuell</text><text x="70" y="514" class="code">cp .env.example .env</text><text x="70" y="536" class="code">$EDITOR .env</text><text x="70" y="558" class="code">docker compose up -d --build</text>

  <rect x="485" y="360" width="395" height="250" class="cli"/>
  <text x="509" y="394" class="section">Tenant-Betrieb</text>
  <text x="519" y="432" class="code">solr-tenant.sh create</text>
  <text x="519" y="462" class="code">solr-tenant.sh passwd</text>
  <text x="519" y="492" class="code">solr-tenant.sh apply</text>
  <text x="519" y="522" class="code">solr-tenant.sh runtime-truth</text>
  <text x="519" y="552" class="small">Gleiche CLI für Standalone und SolrCloud.</text>

  <rect x="934" y="360" width="430" height="250" class="guard"/>
  <text x="958" y="394" class="section">Guardrails</text>
  <text x="968" y="432" class="ok">✓ Pflichtpasswörter gesetzt</text>
  <text x="968" y="462" class="ok">✓ security.json validiert</text>
  <text x="968" y="492" class="ok">✓ Solr PingRequestHandler verwaltet</text>
  <text x="968" y="522" class="ok">✓ AuthZ-Payloads geprüft</text>
  <text x="968" y="552" class="warn">✕ kaputte Security startet nicht weiter</text>

  <rect x="36" y="650" width="640" height="150" class="panel"/>
  <text x="60" y="684" class="section">Standalone</text>
  <text x="70" y="722" class="ok">✓ Cores über Core Admin API</text>
  <text x="70" y="750" class="ok">✓ Security API verwaltet User/Rollen</text>
  <text x="70" y="778" class="warn">✕ harte Core-Isolation braucht Proxy-Regeln</text>

  <rect x="724" y="650" width="640" height="150" class="panel"/>
  <text x="748" y="684" class="section">SolrCloud</text>
  <text x="758" y="722" class="ok">✓ Collections API statt Core Admin API</text>
  <text x="758" y="750" class="ok">✓ ZooKeeper hält Security-State</text>
  <text x="758" y="778" class="ok">✓ Collection-scoped Permissions</text>

  <text x="1160" y="866" class="tiny">© 2026 eLeDia GmbH</text>
</svg>
