<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Installation und Bootstrap">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#262626" stroke-width="0.6"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f97316"/>
    </marker>
    <style>
      .bg{fill:#0a0a0a} .title{font:700 22px Arial,sans-serif;fill:#fdba74} .sub{font:400 12px Arial,sans-serif;fill:#a8a29e}
      .box{fill:#171717;stroke:#f97316;stroke-width:1.6;rx:12} .box2{fill:#111827;stroke:#fb923c;stroke-width:1.4;rx:12}
      .store{fill:#0e0e0e;stroke:#c2410c;stroke-width:1.5} .muted{fill:#1a1a1a;stroke:#78716c;stroke-width:1.2;stroke-dasharray:5 4;rx:10}
      .label{font:700 14px Arial,sans-serif;fill:#fed7aa} .small{font:400 11px Arial,sans-serif;fill:#d6d3d1} .tiny{font:400 10px Arial,sans-serif;fill:#a8a29e}
      .arrow{stroke:#f97316;stroke-width:2;fill:none;marker-end:url(#arr)} .dash{stroke:#fb923c;stroke-width:1.7;fill:none;stroke-dasharray:6 5;marker-end:url(#arr)}
      .group{fill:none;stroke:#7c2d12;stroke-width:1.4;stroke-dasharray:8 6;rx:16}
    </style>
  </defs>
  <rect class="bg" width="980" height="560"/><rect width="980" height="560" fill="url(#grid)" opacity="0.55"/>
  <text x="28" y="38" class="title">Installation und Bootstrap</text>
  <text x="28" y="58" class="sub">Vom Projektverzeichnis bis zur gestarteten Solr Runtime</text>
  <rect x="30" y="90" width="210" height="120" class="box"/>
  <text x="54" y="124" class="label">Projektdateien</text>
  <text x="54" y="152" class="small">docker-compose.yml</text>
  <text x="54" y="172" class="small">.env + tenants.env</text>
  <text x="54" y="192" class="small">eLeDia-config/</text>
  <rect x="300" y="90" width="210" height="120" class="box2"/>
  <text x="324" y="124" class="label">Compose Start</text>
  <text x="324" y="152" class="small">docker compose up -d</text>
  <text x="324" y="172" class="small">Volumes + Network</text>
  <text x="324" y="192" class="small">Healthchecks</text>
  <rect x="570" y="90" width="220" height="120" class="box"/>
  <text x="594" y="124" class="label">eLeDia-solr-init</text>
  <text x="594" y="152" class="small">security.json</text>
  <text x="594" y="172" class="small">Configsets</text>
  <text x="594" y="192" class="small">Bootstrap-Metadaten</text>
  <rect x="570" y="300" width="220" height="120" class="box"/>
  <text x="594" y="334" class="label">Solr Runtime</text>
  <text x="594" y="362" class="small">Solr 9.10.1</text>
  <text x="594" y="382" class="small">Standalone / SolrCloud</text>
  <text x="594" y="402" class="small">AuthN + AuthZ aktiv</text>
  <rect x="300" y="300" width="210" height="120" class="box2"/>
  <text x="324" y="334" class="label">Tenant-CLI</text>
  <text x="324" y="362" class="small">create / passwd</text>
  <text x="324" y="382" class="small">sync-sot</text>
  <text x="324" y="402" class="small">rebuild-permissions</text>
  <rect x="30" y="300" width="210" height="120" class="muted"/>
  <text x="54" y="334" class="label">Reverse Proxy</text>
  <text x="54" y="362" class="small">Apache / Caddy</text>
  <text x="54" y="382" class="small">TLS extern</text>
  <text x="54" y="402" class="small">Solr bleibt lokal</text>
  <line x1="240" y1="150" x2="300" y2="150" class="arrow"/>
  <line x1="510" y1="150" x2="570" y2="150" class="arrow"/>
  <path d="M680 210 V300" class="arrow"/>
  <line x1="570" y1="360" x2="510" y2="360" class="dash"/>
  <line x1="300" y1="360" x2="240" y2="360" class="dash"/>
  <rect x="830" y="104" width="120" height="66" class="store" rx="8"/>
  <ellipse cx="890" cy="104" rx="60" ry="10" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="858" y="132" class="label">Volume</text><text x="848" y="152" class="tiny">Index + Security</text>
  <line x1="790" y1="150" x2="830" y2="136" class="arrow"/>
  <text x="36" y="500" class="small">Reihenfolge: erst Init, dann Runtime. Tenant-Änderungen laufen danach über solr-tenant.sh im Container.</text>
  <text x="830" y="542" class="tiny">© 2026 eLeDia GmbH</text>
</svg>
