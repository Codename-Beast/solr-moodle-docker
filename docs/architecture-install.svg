<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-label="Installation, Bootstrap und Guardrails">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#262626" stroke-width="0.6"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f97316"/>
    </marker>
    <style>
      .bg{fill:#0a0a0a}.title{font:700 22px Arial,sans-serif;fill:#fdba74}.sub{font:400 12px Arial,sans-serif;fill:#a8a29e}
      .box{fill:#171717;stroke:#f97316;stroke-width:1.6;rx:12}.box2{fill:#111827;stroke:#fb923c;stroke-width:1.4;rx:12}.guard{fill:#1f1111;stroke:#fb7185;stroke-width:1.6;rx:12}
      .store{fill:#0e0e0e;stroke:#c2410c;stroke-width:1.5}.muted{fill:#1a1a1a;stroke:#78716c;stroke-width:1.2;stroke-dasharray:5 4;rx:10}.group{fill:none;stroke:#7c2d12;stroke-width:1.4;stroke-dasharray:8 6;rx:16}
      .label{font:700 14px Arial,sans-serif;fill:#fed7aa}.guardlabel{font:700 14px Arial,sans-serif;fill:#fecdd3}.small{font:400 11px Arial,sans-serif;fill:#d6d3d1}.tiny{font:400 10px Arial,sans-serif;fill:#a8a29e}.ok{font:700 11px Arial,sans-serif;fill:#86efac}.warn{font:700 11px Arial,sans-serif;fill:#fb7185}
      .arrow{stroke:#f97316;stroke-width:2;fill:none;marker-end:url(#arr)}.dash{stroke:#fb923c;stroke-width:1.7;fill:none;stroke-dasharray:6 5;marker-end:url(#arr)}.guardline{stroke:#fb7185;stroke-width:1.8;fill:none;stroke-dasharray:6 5;marker-end:url(#arr)}
    </style>
  </defs>
  <rect class="bg" width="1180" height="700"/><rect width="1180" height="700" fill="url(#grid)" opacity="0.55"/>
  <text x="28" y="38" class="title">Installation und Bootstrap</text>
  <text x="28" y="58" class="sub">Vom Projektverzeichnis zur gestarteten Solr Runtime — inklusive Validierung vor dem ersten Start</text>

  <rect x="30" y="90" width="200" height="126" class="box"/>
  <text x="54" y="124" class="label">Projektdateien</text>
  <text x="54" y="152" class="small">docker-compose.yml</text>
  <text x="54" y="172" class="small">.env + tenants.env</text>
  <text x="54" y="192" class="small">eLeDia-config/</text>

  <rect x="280" y="90" width="205" height="126" class="box2"/>
  <text x="304" y="124" class="label">Compose Start</text>
  <text x="304" y="152" class="small">docker compose up -d</text>
  <text x="304" y="172" class="small">Volumes + Network</text>
  <text x="304" y="192" class="small">Healthchecks</text>

  <rect x="535" y="90" width="220" height="126" class="box"/>
  <text x="559" y="124" class="label">eLeDia-solr-init</text>
  <text x="559" y="152" class="small">security.json bauen</text>
  <text x="559" y="172" class="small">Configsets kopieren</text>
  <text x="559" y="192" class="small">Bootstrap-Metadaten</text>

  <rect x="535" y="330" width="220" height="126" class="box"/>
  <text x="559" y="364" class="label">Solr Runtime</text>
  <text x="559" y="392" class="small">Solr 9.10.1</text>
  <text x="559" y="412" class="small">Standalone / SolrCloud</text>
  <text x="559" y="432" class="small">AuthN + AuthZ aktiv</text>

  <rect x="280" y="330" width="205" height="126" class="box2"/>
  <text x="304" y="364" class="label">Tenant-CLI</text>
  <text x="304" y="392" class="small">create / passwd / enable</text>
  <text x="304" y="412" class="small">sync-sot</text>
  <text x="304" y="432" class="small">rebuild-permissions</text>

  <rect x="30" y="330" width="200" height="126" class="muted"/>
  <text x="54" y="364" class="label">Reverse Proxy</text>
  <text x="54" y="392" class="small">Apache / Caddy</text>
  <text x="54" y="412" class="small">TLS extern</text>
  <text x="54" y="432" class="small">Standalone-Isolation</text>

  <rect x="810" y="100" width="135" height="75" class="store" rx="8"/>
  <ellipse cx="877" cy="100" rx="67" ry="10" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="844" y="130" class="label">Volume</text><text x="828" y="153" class="tiny">Index + Security</text>

  <rect x="810" y="235" width="135" height="80" class="store" rx="8"/>
  <ellipse cx="877" cy="235" rx="67" ry="10" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="837" y="267" class="label">ZooKeeper</text><text x="826" y="291" class="tiny">Cloud security.json</text>

  <rect x="985" y="82" width="165" height="420" class="guard"/>
  <text x="1008" y="116" class="guardlabel">Bootstrap-Guards</text>
  <text x="1008" y="150" class="ok">✓ Pflicht-Passwörter</text>
  <text x="1008" y="174" class="ok">✓ JSON valide</text>
  <text x="1008" y="198" class="ok">✓ Permission-Namen</text>
  <text x="1008" y="222" class="ok">✓ admin nur Rolle</text>
  <text x="1008" y="246" class="ok">✓ custom braucht path</text>
  <text x="1008" y="270" class="ok">✓ all zuletzt</text>
  <text x="1008" y="294" class="ok">✓ tenants.env 660</text>
  <text x="1008" y="318" class="ok">✓ API Payload JSON</text>
  <text x="1008" y="342" class="ok">✓ delete nur Index</text>
  <text x="1008" y="366" class="warn">✕ CHANGE_ME Secrets</text>
  <text x="1008" y="390" class="warn">✕ name=admin</text>
  <text x="1008" y="414" class="warn">✕ invalid security.json</text>
  <text x="1008" y="438" class="warn">✕ world-writable secrets</text>

  <line x1="230" y1="153" x2="280" y2="153" class="arrow"/>
  <line x1="485" y1="153" x2="535" y2="153" class="arrow"/>
  <path d="M645 216 V330" class="arrow"/>
  <line x1="755" y1="153" x2="810" y2="138" class="arrow"/>
  <line x1="755" y1="178" x2="810" y2="260" class="dash"/>
  <line x1="535" y1="393" x2="485" y2="393" class="dash"/>
  <line x1="280" y1="393" x2="230" y2="393" class="dash"/>
  <path d="M755 150 C850 150 895 130 985 130" class="guardline"/>
  <path d="M755 395 C860 395 900 320 985 320" class="guardline"/>

  <rect x="30" y="520" width="1118" height="95" class="group"/>
  <text x="54" y="550" class="label">Frühe Fehler statt kaputter Runtime</text>
  <text x="54" y="576" class="small">Der Init-Container schreibt security.json erst nach Validierung von JSON, Permission-Namen und Rollenmodell.</text>
  <text x="54" y="598" class="small">Die Tenant-CLI validiert Security API Payloads, bevor Solr sie annimmt oder als eingebetteten Fehler zurückliefert.</text>

  <text x="1025" y="672" class="tiny">© 2026 eLeDia GmbH</text>
</svg>
