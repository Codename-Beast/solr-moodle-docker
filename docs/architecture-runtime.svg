<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 700" width="1180" height="700" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrdash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#78716c"/>
    </marker>
  </defs>

  <rect width="1180" height="700" fill="#0a0a0a"/>

  <text x="590" y="36" text-anchor="middle" fill="#f97316" font-size="18" font-weight="700">solr-moodle-docker — SolrCloud Runtime Architektur</text>
  <text x="590" y="56" text-anchor="middle" fill="#78716c" font-size="11">Globaler Init-Container zurück: zentral, wiederverwendbar, Multi-Instanz-fähig</text>
  <line x1="30" y1="64" x2="1150" y2="64" stroke="#f97316" stroke-width="1" opacity="0.35"/>

  <!-- Moodle side -->
  <rect x="30" y="86" width="170" height="220" rx="8" fill="#111" stroke="#f97316" stroke-width="2"/>
  <text x="115" y="110" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Moodle Instanzen</text>
  <line x1="42" y1="118" x2="188" y2="118" stroke="#f97316" stroke-width="1" opacity="0.35"/>
  <rect x="46" y="130" width="138" height="28" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="115" y="149" text-anchor="middle" fill="#fed7aa" font-size="10">Tenant A</text>
  <rect x="46" y="166" width="138" height="28" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="115" y="185" text-anchor="middle" fill="#fed7aa" font-size="10">Tenant B</text>
  <rect x="46" y="202" width="138" height="28" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="115" y="221" text-anchor="middle" fill="#fed7aa" font-size="10">Tenant C</text>
  <rect x="46" y="238" width="138" height="28" rx="4" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="4"/>
  <text x="115" y="257" text-anchor="middle" fill="#a8a29e" font-size="10">... bis 500+ Tenants</text>

  <line x1="200" y1="194" x2="240" y2="194" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <text x="220" y="187" text-anchor="middle" fill="#6b7280" font-size="9">HTTPS</text>

  <!-- Reverse Proxy -->
  <rect x="240" y="126" width="140" height="134" rx="8" fill="#111" stroke="#f97316" stroke-width="2"/>
  <text x="310" y="149" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Reverse Proxy</text>
  <line x1="252" y1="157" x2="368" y2="157" stroke="#f97316" stroke-width="1" opacity="0.35"/>
  <rect x="258" y="168" width="104" height="26" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="310" y="186" text-anchor="middle" fill="#fed7aa" font-size="10">Apache / Caddy</text>
  <rect x="258" y="200" width="104" height="26" rx="4" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.5"/>
  <text x="310" y="218" text-anchor="middle" fill="#fb923c" font-size="10">TLS-Termination</text>

  <line x1="380" y1="194" x2="420" y2="194" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400" y="187" text-anchor="middle" fill="#6b7280" font-size="9">:8983</text>

  <!-- Docker Stack -->
  <rect x="420" y="86" width="500" height="516" rx="10" fill="#0d0d0d" stroke="#f97316" stroke-width="2.5"/>
  <text x="670" y="109" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">Docker Compose Stack</text>
  <text x="670" y="124" text-anchor="middle" fill="#6b7280" font-size="10">SolrCloud runtime + global init workflow</text>
  <line x1="432" y1="132" x2="908" y2="132" stroke="#f97316" stroke-width="1" opacity="0.35"/>

  <!-- Global Init Container -->
  <rect x="438" y="146" width="464" height="114" rx="8" fill="#131313" stroke="#ea580c" stroke-width="2"/>
  <text x="670" y="169" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">Init Container (globalisiert): eLeDia-solr-init</text>
  <line x1="450" y1="176" x2="890" y2="176" stroke="#ea580c" stroke-width="1" opacity="0.35"/>
  <text x="670" y="195" text-anchor="middle" fill="#fed7aa" font-size="10">One-shot je Deploy, steuert mehrere Solr-Instanzen über Docker-Netzwerk</text>
  <text x="670" y="212" text-anchor="middle" fill="#a8a29e" font-size="10">1) wait-for-health  2) security.json upload  3) eLeDia-moodle-tenant configset upload</text>
  <text x="670" y="229" text-anchor="middle" fill="#a8a29e" font-size="10">4) solr-tenant.sh apply (SOT)  5) setup/install/init logs auf Host schreiben</text>
  <text x="670" y="246" text-anchor="middle" fill="#6b7280" font-size="9">Targets: solr-a:8983 | solr-b:8983 | solr-c:8983 (optional erweiterbar)</text>

  <!-- Solr Instance A -->
  <rect x="438" y="278" width="222" height="198" rx="8" fill="#111" stroke="#ff8a00" stroke-width="1.8"/>
  <text x="549" y="300" text-anchor="middle" fill="#fed7aa" font-size="11" font-weight="700">Solr Instanz A (runtime)</text>
  <line x1="450" y1="308" x2="648" y2="308" stroke="#ff8a00" stroke-width="1" opacity="0.35"/>
  <rect x="454" y="318" width="190" height="40" rx="5" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="549" y="334" text-anchor="middle" fill="#fed7aa" font-size="10">Apache Solr :8983 (SolrCloud)</text>
  <text x="549" y="349" text-anchor="middle" fill="#a8a29e" font-size="9">search | update | extract | Collections API</text>
  <rect x="454" y="365" width="190" height="34" rx="5" fill="#141414" stroke="#ea580c" stroke-width="1.5"/>
  <text x="549" y="386" text-anchor="middle" fill="#fb923c" font-size="10">Security + Roles (ZK-backed)</text>
  <rect x="454" y="406" width="190" height="28" rx="5" fill="#111" stroke="#ff8a00" stroke-width="1.2"/>
  <text x="549" y="424" text-anchor="middle" fill="#a8a29e" font-size="9">Collections: eLeDia_cloud_*</text>
  <rect x="454" y="441" width="190" height="26" rx="5" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="4"/>
  <text x="549" y="458" text-anchor="middle" fill="#a8a29e" font-size="9">solr-tenant.sh create/delete/passwd/sync</text>

  <!-- Solr Instance B/C -->
  <rect x="678" y="278" width="224" height="198" rx="8" fill="#111" stroke="#ff8a00" stroke-width="1.8"/>
  <text x="790" y="300" text-anchor="middle" fill="#fed7aa" font-size="11" font-weight="700">Weitere Instanzen</text>
  <line x1="690" y1="308" x2="890" y2="308" stroke="#ff8a00" stroke-width="1" opacity="0.35"/>
  <rect x="694" y="318" width="196" height="34" rx="5" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="792" y="339" text-anchor="middle" fill="#fed7aa" font-size="10">solr-b:8983 (gleiches Default-Setup)</text>
  <rect x="694" y="360" width="196" height="34" rx="5" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="792" y="381" text-anchor="middle" fill="#fed7aa" font-size="10">solr-c:8983 (gleiches Default-Setup)</text>
  <rect x="694" y="402" width="196" height="26" rx="5" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.3"/>
  <text x="792" y="420" text-anchor="middle" fill="#fb923c" font-size="9">Init bedient alle Instanzen sequenziell</text>
  <rect x="694" y="436" width="196" height="30" rx="5" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="4"/>
  <text x="792" y="455" text-anchor="middle" fill="#a8a29e" font-size="9">kein Init-Container-Müll pro Einzelinstanz</text>

  <!-- Config defaults -->
  <rect x="438" y="490" width="464" height="96" rx="8" fill="#101010" stroke="#78716c" stroke-width="1.3" stroke-dasharray="5"/>
  <text x="670" y="512" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">Default Konfiguration (wichtig)</text>
  <line x1="450" y1="519" x2="890" y2="519" stroke="#78716c" stroke-width="1" opacity="0.35"/>
  <text x="670" y="539" text-anchor="middle" fill="#a8a29e" font-size="10">eLeDia-config/managed-schema und eLeDia-config/solrconfig.xml sind die DEFAULT-Quelle</text>
  <text x="670" y="556" text-anchor="middle" fill="#a8a29e" font-size="10">Init lädt daraus immer eLeDia-moodle-tenant als Standard-Configset nach ZooKeeper</text>
  <text x="670" y="573" text-anchor="middle" fill="#6b7280" font-size="9">Schema-/solrconfig-Änderungen laufen zentral über eLeDia-config (nicht per Container-Drift)</text>

  <!-- Arrows from init to instances -->
  <line x1="610" y1="260" x2="560" y2="278" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="730" y1="260" x2="780" y2="278" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Persistence -->
  <line x1="920" y1="336" x2="952" y2="336" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="952" y="86" width="198" height="516" rx="10" fill="#0d0d0d" stroke="#c2410c" stroke-width="2"/>
  <text x="1051" y="109" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">Persistenz (Host)</text>
  <line x1="964" y1="117" x2="1138" y2="117" stroke="#c2410c" stroke-width="1" opacity="0.35"/>

  <rect x="970" y="130" width="162" height="52" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="1051" cy="130" rx="81" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="1051" y="158" text-anchor="middle" fill="#fb923c" font-size="10">solr_data/</text>
  <text x="1051" y="172" text-anchor="middle" fill="#6b7280" font-size="9">index + ZK state</text>

  <rect x="970" y="198" width="162" height="52" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="1051" cy="198" rx="81" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="1051" y="226" text-anchor="middle" fill="#fb923c" font-size="10">tenants.env (rw)</text>
  <text x="1051" y="240" text-anchor="middle" fill="#6b7280" font-size="9">Source of Truth</text>

  <rect x="970" y="266" width="162" height="110" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="1051" cy="266" rx="81" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="1051" y="294" text-anchor="middle" fill="#fb923c" font-size="10">/var/log/eledia/solr/</text>
  <text x="1051" y="309" text-anchor="middle" fill="#6b7280" font-size="9">&lt;instance&gt;/init.log</text>
  <text x="1051" y="323" text-anchor="middle" fill="#6b7280" font-size="9">&lt;instance&gt;/setup.log</text>
  <text x="1051" y="337" text-anchor="middle" fill="#6b7280" font-size="9">&lt;instance&gt;/runtime.log</text>
  <text x="1051" y="351" text-anchor="middle" fill="#6b7280" font-size="9">&lt;instance&gt;/install.log</text>
  <text x="1051" y="365" text-anchor="middle" fill="#6b7280" font-size="9">(+ docker service logs)</text>

  <rect x="970" y="392" width="162" height="52" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="1051" cy="392" rx="81" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="1051" y="420" text-anchor="middle" fill="#fb923c" font-size="10">solr_backups/</text>
  <text x="1051" y="434" text-anchor="middle" fill="#6b7280" font-size="9">snapshots</text>

  <rect x="970" y="460" width="162" height="52" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="1051" cy="460" rx="81" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="1051" y="488" text-anchor="middle" fill="#fb923c" font-size="10">eLeDia-config/</text>
  <text x="1051" y="502" text-anchor="middle" fill="#6b7280" font-size="9">managed-schema + solrconfig.xml</text>

  <!-- management -->
  <line x1="1051" y1="602" x2="1051" y2="632" stroke="#78716c" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrdash)"/>
  <rect x="30" y="638" width="1120" height="44" rx="8" fill="#111" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="590" y="664" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">Management Layer: Ansible (deploy/config), solr-overwatch, Solr Admin UI, Monitoring</text>

  <text x="590" y="694" text-anchor="middle" fill="#374151" font-size="9">eLeDia GmbH — solr-moodle-docker — Runtime mit globalem Init-Container und Host-Logs unter /var/log/eledia/solr</text>
</svg>
