<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 620" width="1020" height="620" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrdash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#78716c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1020" height="620" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="510" y="36" text-anchor="middle" fill="#f97316" font-size="17" font-weight="700">solr-moodle-docker — SolrCloud Runtime Architektur</text>
  <text x="510" y="54" text-anchor="middle" fill="#78716c" font-size="11">SolrCloud default since Solr 10.1 — standalone removed</text>
  <line x1="30" y1="62" x2="990" y2="62" stroke="#f97316" stroke-width="1" opacity="0.35"/>

  <!-- ── Moodle Instanzen ── -->
  <rect x="30" y="80" width="155" height="200" rx="8" fill="#111" stroke="#f97316" stroke-width="2"/>
  <text x="107" y="103" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Moodle Instanzen</text>
  <line x1="40" y1="111" x2="175" y2="111" stroke="#f97316" stroke-width="1" opacity="0.35"/>
  <rect x="46" y="121" width="119" height="26" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="105" y="139" text-anchor="middle" fill="#fed7aa" font-size="10">Tenant A</text>
  <rect x="46" y="154" width="119" height="26" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="105" y="172" text-anchor="middle" fill="#fed7aa" font-size="10">Tenant B</text>
  <rect x="46" y="187" width="119" height="26" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="105" y="205" text-anchor="middle" fill="#fed7aa" font-size="10">Tenant C</text>
  <rect x="46" y="220" width="119" height="26" rx="4" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="4"/>
  <text x="105" y="238" text-anchor="middle" fill="#a8a29e" font-size="10">... bis 500 Tenants</text>
  <line x1="185" y1="180" x2="215" y2="180" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <text x="200" y="173" text-anchor="middle" fill="#6b7280" font-size="9">HTTPS</text>

  <!-- ── Reverse Proxy ── -->
  <rect x="215" y="120" width="135" height="120" rx="8" fill="#111" stroke="#f97316" stroke-width="2"/>
  <text x="282" y="143" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Reverse Proxy</text>
  <line x1="225" y1="151" x2="340" y2="151" stroke="#f97316" stroke-width="1" opacity="0.35"/>
  <rect x="231" y="161" width="103" height="24" rx="4" fill="#171717" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="282" y="178" text-anchor="middle" fill="#fed7aa" font-size="10">Apache / Caddy</text>
  <rect x="231" y="191" width="103" height="24" rx="4" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.5"/>
  <text x="282" y="208" text-anchor="middle" fill="#fb923c" font-size="10">TLS-Terminierung</text>
  <line x1="350" y1="180" x2="380" y2="180" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <text x="365" y="173" text-anchor="middle" fill="#6b7280" font-size="9">:8983</text>

  <!-- ── Docker Container: solr ── -->
  <rect x="380" y="75" width="370" height="430" rx="10" fill="#0d0d0d" stroke="#f97316" stroke-width="2.5"/>
  <text x="565" y="99" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">Docker: solr</text>
  <text x="565" y="115" text-anchor="middle" fill="#6b7280" font-size="10">image: solr-eledia:10.x  |  user: 8983:8983</text>
  <line x1="390" y1="122" x2="740" y2="122" stroke="#f97316" stroke-width="1" opacity="0.35"/>

  <!-- Apache Solr engine -->
  <rect x="396" y="130" width="338" height="52" rx="6" fill="#171717" stroke="#ff8a00" stroke-width="2"/>
  <text x="565" y="152" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">Apache Solr :8983  —  SolrCloud mode</text>
  <text x="565" y="170" text-anchor="middle" fill="#a8a29e" font-size="10">search  |  update  |  /extract (Tika)  |  Collections API</text>

  <!-- ZooKeeper embedded -->
  <rect x="396" y="194" width="160" height="60" rx="5" fill="#141414" stroke="#ea580c" stroke-width="1.5"/>
  <text x="476" y="216" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">Embedded ZooKeeper</text>
  <text x="476" y="232" text-anchor="middle" fill="#6b7280" font-size="10">security.json</text>
  <text x="476" y="246" text-anchor="middle" fill="#6b7280" font-size="10">eLeDia-moodle-tenant configset</text>

  <!-- Security -->
  <rect x="566" y="194" width="168" height="60" rx="5" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.5"/>
  <text x="650" y="216" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">Security (ZK-backed)</text>
  <text x="650" y="232" text-anchor="middle" fill="#6b7280" font-size="10">BasicAuth + Roles</text>
  <text x="650" y="246" text-anchor="middle" fill="#6b7280" font-size="10">401 anonym — pro Collection</text>

  <!-- Collections -->
  <rect x="396" y="266" width="338" height="64" rx="5" fill="#111" stroke="#ff8a00" stroke-width="1.5"/>
  <text x="565" y="286" text-anchor="middle" fill="#fed7aa" font-size="11" font-weight="600">Collections</text>
  <text x="565" y="302" text-anchor="middle" fill="#a8a29e" font-size="10">eLeDia_cloud_tenantA  |  eLeDia_cloud_tenantB  |  eLeDia_cloud_tenantC</text>
  <text x="565" y="318" text-anchor="middle" fill="#6b7280" font-size="10">configset: eLeDia-moodle-tenant  |  replicationFactor: 1</text>

  <!-- solr-tenant.sh -->
  <rect x="396" y="342" width="338" height="44" rx="5" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="565" y="362" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">solr-tenant.sh</text>
  <text x="565" y="378" text-anchor="middle" fill="#6b7280" font-size="10">create  |  delete  |  passwd  |  sync-sot  |  apply</text>

  <!-- solr-cloud-entrypoint -->
  <rect x="396" y="398" width="338" height="38" rx="5" fill="#141414" stroke="#ea580c" stroke-width="1.5"/>
  <text x="565" y="415" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">solr-cloud-entrypoint.sh  (boot)</text>
  <text x="565" y="430" text-anchor="middle" fill="#6b7280" font-size="10">upload security.json → ZK  |  upload configset → ZK  |  solr-tenant.sh apply</text>

  <!-- eLeDia-config -->
  <rect x="396" y="448" width="338" height="38" rx="5" fill="#0e0e0e" stroke="#78716c" stroke-width="1" stroke-dasharray="4"/>
  <text x="565" y="465" text-anchor="middle" fill="#a8a29e" font-size="10">eLeDia-config/  (bind-mount, read-only)</text>
  <text x="565" y="480" text-anchor="middle" fill="#6b7280" font-size="10">managed-schema  |  solrconfig.xml  →  configset source</text>

  <!-- Arrow Container → Persistence -->
  <line x1="750" y1="280" x2="782" y2="280" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Persistenz ── -->
  <rect x="782" y="75" width="208" height="430" rx="10" fill="#0d0d0d" stroke="#c2410c" stroke-width="2"/>
  <text x="886" y="99" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">Persistenz</text>
  <line x1="792" y1="108" x2="980" y2="108" stroke="#c2410c" stroke-width="1" opacity="0.35"/>

  <!-- solr_data -->
  <rect x="798" y="118" width="176" height="50" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="886" cy="118" rx="88" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="886" y="146" text-anchor="middle" fill="#fb923c" font-size="10">solr_data/</text>
  <text x="886" y="160" text-anchor="middle" fill="#6b7280" font-size="9">index + ZK-snapshots</text>

  <!-- tenants.env -->
  <rect x="798" y="188" width="176" height="50" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="886" cy="188" rx="88" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="886" y="216" text-anchor="middle" fill="#fb923c" font-size="10">tenants.env  (rw)</text>
  <text x="886" y="230" text-anchor="middle" fill="#6b7280" font-size="9">Source of Truth</text>

  <!-- Host Logs -->
  <rect x="798" y="258" width="176" height="64" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="886" cy="258" rx="88" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="886" y="286" text-anchor="middle" fill="#fb923c" font-size="10">/var/log/eledia/</text>
  <text x="886" y="300" text-anchor="middle" fill="#6b7280" font-size="9">&lt;instance&gt;/solr/  &lt;instance&gt;/init/</text>
  <text x="886" y="313" text-anchor="middle" fill="#6b7280" font-size="9">alle Docker-Logs auf Host</text>

  <!-- solr_backups -->
  <rect x="798" y="342" width="176" height="50" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="886" cy="342" rx="88" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="886" y="370" text-anchor="middle" fill="#fb923c" font-size="10">solr_backups/</text>
  <text x="886" y="384" text-anchor="middle" fill="#6b7280" font-size="9">Snapshot-Backups</text>

  <!-- eLeDia-config host -->
  <rect x="798" y="412" width="176" height="50" rx="4" fill="#0e0e0e" stroke="#c2410c" stroke-width="1.5"/>
  <ellipse cx="886" cy="412" rx="88" ry="8" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="886" y="440" text-anchor="middle" fill="#fb923c" font-size="10">eLeDia-config/</text>
  <text x="886" y="454" text-anchor="middle" fill="#6b7280" font-size="9">schema + solrconfig (Ansible)</text>

  <!-- ── Ansible / Management Arrow ── -->
  <line x1="886" y1="505" x2="886" y2="536" stroke="#78716c" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrdash)"/>

  <!-- ── Management Layer ── -->
  <rect x="30" y="540" width="960" height="58" rx="8" fill="#111" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="510" y="560" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">Management Layer</text>
  <rect x="50" y="567" width="140" height="22" rx="4" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.5"/>
  <text x="120" y="583" text-anchor="middle" fill="#fb923c" font-size="10">Ansible (deploy + config_new)</text>
  <rect x="200" y="567" width="120" height="22" rx="4" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.5"/>
  <text x="260" y="583" text-anchor="middle" fill="#fb923c" font-size="10">solr-overwatch (Laravel)</text>
  <rect x="330" y="567" width="110" height="22" rx="4" fill="#1a1a1a" stroke="#ea580c" stroke-width="1.5"/>
  <text x="385" y="583" text-anchor="middle" fill="#fb923c" font-size="10">Solr Admin UI</text>
  <rect x="450" y="567" width="130" height="22" rx="4" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="3"/>
  <text x="515" y="583" text-anchor="middle" fill="#a8a29e" font-size="10">Moodle Plugin (eLeDia)</text>
  <rect x="590" y="567" width="130" height="22" rx="4" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="3"/>
  <text x="655" y="583" text-anchor="middle" fill="#a8a29e" font-size="10">Grafana / Prometheus</text>
  <rect x="730" y="567" width="110" height="22" rx="4" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="3"/>
  <text x="785" y="583" text-anchor="middle" fill="#a8a29e" font-size="10">Rundeck</text>
  <rect x="850" y="567" width="120" height="22" rx="4" fill="#1a1a1a" stroke="#78716c" stroke-width="1" stroke-dasharray="3"/>
  <text x="910" y="583" text-anchor="middle" fill="#a8a29e" font-size="10">solr-wizard (optional)</text>

  <!-- Footer -->
  <text x="510" y="610" text-anchor="middle" fill="#374151" font-size="9">eLeDia GmbH — solr-moodle-docker — github.com/Codename-Beast/solr-moodle-docker</text>
</svg>
