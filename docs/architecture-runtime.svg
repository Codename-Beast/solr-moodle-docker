<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-label="Runtime Architektur des eLeDia Solr Moodle Stacks">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#262626" stroke-width="0.7"/></pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <style>
      .bg{fill:#0a0a0a}.title{font:700 28px Arial,sans-serif;fill:#fdba74}.sub{font:400 14px Arial,sans-serif;fill:#a8a29e}.section{font:700 17px Arial,sans-serif;fill:#fed7aa}.label{font:700 15px Arial,sans-serif;fill:#fed7aa}.small{font:400 12px Arial,sans-serif;fill:#e7e5e4}.tiny{font:400 10.5px Arial,sans-serif;fill:#a8a29e}.code{font:400 12px 'Courier New',monospace;fill:#e5e7eb}.codehi{font:700 12px 'Courier New',monospace;fill:#fdba74}.ok{font:700 12px Arial,sans-serif;fill:#86efac}.warn{font:700 12px Arial,sans-serif;fill:#fb7185}
      .box{fill:#171717;stroke:#f97316;stroke-width:1.8;rx:14}.cfg{fill:#111827;stroke:#fb923c;stroke-width:1.6;rx:14}.cli{fill:#0f172a;stroke:#38bdf8;stroke-width:1.7;rx:14}.guard{fill:#1f1111;stroke:#fb7185;stroke-width:1.7;rx:14}.store{fill:#0e0e0e;stroke:#c2410c;stroke-width:1.6}.muted{fill:#1a1a1a;stroke:#78716c;stroke-width:1.3;stroke-dasharray:6 5;rx:12}.panel{fill:#101010;stroke:#7c2d12;stroke-width:1.4;stroke-dasharray:8 6;rx:18}.legend{fill:#0f0f0f;stroke:#44403c;stroke-width:1.2;rx:12}
      .arrow{stroke:#f97316;stroke-width:2.2;fill:none;marker-end:url(#arr)}.blue{stroke:#38bdf8;stroke-width:2;fill:none;marker-end:url(#arrBlue)}
    </style>
  </defs>
  <rect class="bg" width="1500" height="920"/><rect width="1500" height="920" fill="url(#grid)" opacity="0.55"/>
  <text x="36" y="46" class="title">Runtime Architektur</text>
  <text x="36" y="72" class="sub">Moodle spricht Solr über Proxy oder internes Netzwerk an. Tenants werden über Solr Security und Collections isoliert.</text>

  <rect x="36" y="110" width="1428" height="230" class="panel"/>
  <text x="60" y="142" class="section">Request-Pfad</text>
  <rect x="70" y="178" width="160" height="86" class="cfg"/><text x="94" y="212" class="label">Moodle</text><text x="94" y="236" class="small">Global Search</text>
  <rect x="300" y="168" width="250" height="108" class="muted"/><text x="324" y="200" class="label">Reverse Proxy</text><text x="324" y="226" class="small">Caddy / Nginx / Apache</text><text x="324" y="250" class="code">kundendomain.de/solr</text><text x="324" y="270" class="code">solr.kundendomain.de → /solr/</text>
  <rect x="620" y="178" width="190" height="86" class="box"/><text x="644" y="212" class="label">Solr API</text><text x="644" y="236" class="small">/select /update</text><text x="644" y="256" class="small">/schema /admin</text>
  <rect x="880" y="178" width="190" height="86" class="store" rx="10"/><ellipse cx="975" cy="178" rx="95" ry="11" fill="#141414" stroke="#c2410c" stroke-width="1.6"/><text x="923" y="212" class="label">Indexdaten</text><text x="915" y="236" class="small">Cores / Collections</text>
  <rect x="1140" y="178" width="230" height="86" class="store" rx="10"/><ellipse cx="1255" cy="178" rx="115" ry="11" fill="#141414" stroke="#c2410c" stroke-width="1.6"/><text x="1182" y="212" class="label">Security Runtime</text><text x="1180" y="236" class="small">User, Rollen, ACLs</text>
  <path d="M230 221H295" class="arrow"/><path d="M550 221H615" class="arrow"/><path d="M810 221H875" class="arrow"/><path d="M1070 221H1135" class="arrow"/>

  <rect x="36" y="385" width="445" height="250" class="cli"/>
  <text x="60" y="420" class="section">Tenant-Management</text>
  <text x="70" y="458" class="code">solr-tenant.sh create</text>
  <text x="70" y="488" class="code">solr-tenant.sh passwd</text>
  <text x="70" y="518" class="code">solr-tenant.sh core-add</text>
  <text x="70" y="548" class="code">solr-tenant.sh sync-sot</text>
  <text x="70" y="578" class="small">Ein CLI-Pfad für Standalone und SolrCloud.</text>

  <rect x="528" y="385" width="445" height="250" class="cli"/>
  <text x="552" y="420" class="section">Wahrheitsquellen</text>
  <text x="562" y="458" class="codehi">tenants.env</text><text x="562" y="480" class="small">gewünschter Zustand</text>
  <text x="562" y="518" class="codehi">runtime-truth</text><text x="562" y="540" class="small">Solr API + ZooKeeper</text>
  <text x="562" y="578" class="codehi">drift-detect</text><text x="562" y="600" class="small">vergleicht SOT und Runtime</text>

  <rect x="1020" y="385" width="444" height="250" class="guard"/>
  <text x="1044" y="420" class="section">Runtime-Guardrails</text>
  <text x="1054" y="458" class="ok">✓ Ping-Healthcheck-Datei verwaltet</text>
  <text x="1054" y="488" class="ok">✓ Tenant-Regeln vor Fallback all</text>
  <text x="1054" y="518" class="ok">✓ passwd baut Rollen/ACLs neu</text>
  <text x="1054" y="548" class="ok">✓ Drift kann erkannt und repariert werden</text>
  <text x="1054" y="578" class="warn">✕ ungültige Permission-Payloads blockiert</text>

  <rect x="36" y="680" width="690" height="150" class="panel"/>
  <text x="60" y="714" class="section">Standalone</text>
  <text x="70" y="752" class="ok">✓ einzelne Solr Runtime mit Cores</text>
  <text x="70" y="780" class="ok">✓ Security API schützt User und Rollen</text>
  <text x="70" y="808" class="warn">✕ Core-Isolation braucht Proxy-Regeln</text>

  <rect x="774" y="680" width="690" height="150" class="panel"/>
  <text x="798" y="714" class="section">SolrCloud</text>
  <text x="808" y="752" class="ok">✓ Collections statt Cores</text>
  <text x="808" y="780" class="ok">✓ ZooKeeper hält Security- und Cluster-State</text>
  <text x="808" y="808" class="ok">✓ Collection-ACLs isolieren direkt in Solr</text>

  <text x="1260" y="886" class="tiny">© 2026 eLeDia GmbH</text>
</svg>
