<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-label="Runtime: Moodle, Proxy, Solr und Tenant-Isolation">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#262626" stroke-width="0.6"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f97316"/>
    </marker>
    <style>
      .bg{fill:#0a0a0a} .title{font:700 22px Arial,sans-serif;fill:#fdba74} .sub{font:400 12px Arial,sans-serif;fill:#a8a29e}
      .box{fill:#171717;stroke:#f97316;stroke-width:1.6;rx:12} .box2{fill:#111827;stroke:#fb923c;stroke-width:1.4;rx:12}
      .store{fill:#0e0e0e;stroke:#c2410c;stroke-width:1.5} .muted{fill:#1a1a1a;stroke:#78716c;stroke-width:1.2;stroke-dasharray:5 4;rx:10}
      .label{font:700 14px Arial,sans-serif;fill:#fed7aa} .small{font:400 11px Arial,sans-serif;fill:#d6d3d1} .tiny{font:400 10px Arial,sans-serif;fill:#a8a29e}
      .arrow{stroke:#f97316;stroke-width:2;fill:none;marker-end:url(#arr)} .dash{stroke:#fb923c;stroke-width:1.7;fill:none;stroke-dasharray:6 5;marker-end:url(#arr)}
      .group{fill:none;stroke:#7c2d12;stroke-width:1.4;stroke-dasharray:8 6;rx:16}
    </style>
  </defs>
  <rect class="bg" width="1040" height="600"/><rect width="1040" height="600" fill="url(#grid)" opacity="0.55"/>
  <text x="28" y="38" class="title">Runtime: Moodle, Proxy, Solr und Tenant-Isolation</text>
  <text x="28" y="58" class="sub">Normale Requests, Tenant-Rechte und Runtime Source of Truth</text>
  <rect x="34" y="110" width="180" height="100" class="box2"/>
  <text x="58" y="144" class="label">Moodle</text>
  <text x="58" y="172" class="small">Global Search</text>
  <text x="58" y="192" class="small">Basic Auth</text>
  <rect x="280" y="110" width="190" height="100" class="muted"/>
  <text x="304" y="144" class="label">Proxy</text>
  <text x="304" y="172" class="small">HTTPS / TLS</text>
  <text x="304" y="192" class="small">Header weiterreichen</text>
  <rect x="540" y="80" width="240" height="160" class="box"/>
  <text x="564" y="114" class="label">Solr</text>
  <text x="564" y="142" class="small">AuthN/AuthZ</text>
  <text x="564" y="162" class="small">Cores oder Collections</text>
  <text x="564" y="182" class="small">/select /update /schema</text>
  <text x="564" y="202" class="small">/update/extract für Tika</text>
  <rect x="835" y="90" width="160" height="130" class="box2"/>
  <text x="859" y="124" class="label">Tenant</text>
  <text x="859" y="152" class="small">eigener User</text>
  <text x="859" y="172" class="small">eigene Rechte</text>
  <text x="859" y="192" class="small">eigene Daten</text>
  <rect x="540" y="320" width="240" height="125" class="box"/>
  <text x="564" y="354" class="label">solr-tenant.sh</text>
  <text x="564" y="382" class="small">sync-sot</text>
  <text x="564" y="402" class="small">rebuild-permissions</text>
  <text x="564" y="422" class="small">drift-detect / export</text>
  <rect x="835" y="315" width="160" height="80" class="store" rx="8"/><ellipse cx="915" cy="315" rx="80" ry="10" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="868" y="348" class="label">tenants.env</text><text x="862" y="372" class="tiny">Tenant-SOT</text>
  <rect x="835" y="440" width="160" height="80" class="store" rx="8"/><ellipse cx="915" cy="440" rx="80" ry="10" fill="#141414" stroke="#c2410c" stroke-width="1.5"/>
  <text x="878" y="473" class="label">ZooKeeper</text><text x="862" y="497" class="tiny">SolrCloud Runtime</text>
  <line x1="214" y1="160" x2="280" y2="160" class="arrow"/><line x1="470" y1="160" x2="540" y2="160" class="arrow"/><line x1="780" y1="155" x2="835" y2="155" class="arrow"/>
  <path d="M660 240 V320" class="dash"/><line x1="780" y1="360" x2="835" y2="350" class="dash"/><line x1="780" y1="410" x2="835" y2="474" class="dash"/>
  <rect x="34" y="320" width="435" height="135" class="group"/>
  <text x="58" y="350" class="label">Security-Regel</text>
  <text x="58" y="378" class="small">tenant-spezifische Regeln stehen vor generischen Regeln.</text>
  <text x="58" y="402" class="small">Die Fallback-Permission all bleibt am Ende.</text>
  <text x="58" y="426" class="small">Damit wird kein Tenant von einer generischen Regel überdeckt.</text>
  <text x="890" y="582" class="tiny">© 2026 eLeDia GmbH</text>
</svg>
