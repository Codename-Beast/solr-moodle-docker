name: Main Minimal

on:
  push:
    branches: [main]

jobs:
  minimal-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose config check
        run: docker compose config >/dev/null
      - name: Shell syntax
        run: |
          for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done
