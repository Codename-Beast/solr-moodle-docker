name: Solr Test Suite

on:
  push:
    branches: [ main, develop, "claude/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  solr-test:
    name: Solr Tests (Debian ${{ matrix.debian-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        debian-version: [12, 13]
      fail-fast: false

    container:
      image: debian:${{ matrix.debian-version }}
      options: --privileged

    steps:
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y curl ca-certificates gnupg lsb-release git

        # Install Docker
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc

        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null

        apt-get update
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

        # Start Docker daemon
        dockerd > /dev/null 2>&1 &

        # Wait for Docker to be ready
        echo "⏳ Waiting for Docker daemon to start..."
        for i in $(seq 1 30); do
          if docker info > /dev/null 2>&1; then
            echo "✅ Docker daemon is ready"
            break
          fi
          echo "Still waiting... ($i/30)"
          sleep 1
        done

        # Verify Docker is working
        docker info > /dev/null 2>&1 || (echo "❌ Docker daemon failed to start" && exit 1)

        echo "✅ Debian ${{ matrix.debian-version }} environment ready"
        echo "Docker version: $(docker --version)"
        echo "Docker Compose version: $(docker compose version)"

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate .env file
      run: |
        echo "🔧 Generating .env file..."
        echo "📂 Current directory: $(pwd)"
        echo "📋 Checking for init directory:"
        ls -la init/ || echo "❌ init directory not found"
        echo ""
        docker compose --profile setup up moodle_setup

        # Verify .env was created
        if [ ! -f ".env" ]; then
          echo "❌ ERROR: .env file was not created"
          exit 1
        fi

        echo "✅ .env file created successfully"
        ls -lah .env

        # Show non-sensitive parts for debugging
        echo "📋 .env preview (first 10 lines, passwords hidden):"
        head -n 10 .env | grep -v PASSWORD || true

    - name: Build init container
      run: |
        echo "🔨 Building init container..."
        docker compose build solr-init

    - name: Start Solr
      run: |
        echo "🚀 Starting Solr containers..."
        docker compose up -d

    - name: Wait for Solr to be healthy
      run: |
        echo "⏳ Waiting for Solr to be healthy (max 2 minutes)..."
        timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Still waiting..."; done'
        echo "✅ Solr is healthy"

    - name: Show container status
      run: |
        echo "📊 Container status:"
        docker compose ps
        echo ""
        echo "📋 Solr logs (last 50 lines):"
        docker compose logs --tail=50 solr

    - name: Run unit tests
      run: |
        echo "🧪 Running unit tests..."
        chmod +x scripts/run-tests.sh
        ./scripts/run-tests.sh --unit-only

    - name: Run integration tests
      run: |
        echo "🔗 Running integration tests..."
        ./scripts/run-tests.sh --integration-only --no-cleanup

    - name: Run security tests
      run: |
        echo "🔒 Running security tests..."
        ./scripts/run-tests.sh --security-only --no-cleanup

    - name: Run Moodle document tests
      run: |
        echo "📚 Running Moodle document tests..."
        chmod +x scripts/test-moodle-documents.sh
        ./scripts/test-moodle-documents.sh

    - name: Show logs on failure
      if: failure()
      run: |
        echo "❌ Tests failed. Showing logs..."
        echo ""
        echo "📋 All container logs:"
        docker compose logs
        echo ""
        echo "📊 Container status:"
        docker compose ps

    - name: Cleanup
      if: always()
      run: |
        echo "🧹 Cleaning up..."
        docker compose down -v
        rm -f .env

