name: Solr Test Suite

on:
  push:
    branches: [ main, develop, "claude/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  solr-test:
    name: Solr Tests (${{ matrix.core_name }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        core_name:
          - moodle_core  # Default core name
          - custom_test_core  # Test custom core name feature

    steps:
    - name: Install dependencies
      run: |
        echo "Ubuntu environment ready"
        echo "Docker version: $(docker --version)"
        echo "Docker Compose version: $(docker compose version)"

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate .env file
      run: |
        echo "Generating .env file with core name: ${{ matrix.core_name }}..."
        SOLR_CORE_NAME=${{ matrix.core_name }} docker compose --profile setup up moodle_setup
        echo ".env file created successfully"
        ls -lah .env
        echo "Core name in .env:"
        grep SOLR_CORE_NAME .env

    - name: Build init container
      run: |
        echo "Building init container..."
        docker compose build solr-init

    - name: Start Solr
      run: |
        echo "Starting Solr containers..."
        docker compose up -d

    - name: Wait for Solr to be healthy
      run: |
        echo "Waiting for Solr to be healthy (max 2 minutes)..."
        timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Still waiting..."; done'
        echo "Solr is healthy"

    - name: Show container status
      run: |
        echo "Container status:"
        docker compose ps
        echo ""
        echo "Solr logs (last 50 lines):"
        docker compose logs --tail=50 solr

    - name: Run unit tests
      run: |
        echo "Running unit tests..."
        chmod +x scripts/run-tests.sh
        ./scripts/run-tests.sh --unit-only

    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        ./scripts/run-tests.sh --integration-only --no-cleanup

    - name: Run security tests
      run: |
        echo "Running security tests..."
        ./scripts/run-tests.sh --security-only --no-cleanup

    - name: Run Moodle document tests
      run: |
        echo "Running Moodle document tests..."
        chmod +x scripts/test-moodle-documents.sh
        ./scripts/test-moodle-documents.sh

    - name: Show logs on failure
      if: failure()
      run: |
        echo "Tests failed. Showing logs..."
        echo ""
        echo "All container logs:"
        docker compose logs
        echo ""
        echo "Container status:"
        docker compose ps

    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up..."
        docker compose down -v
        rm -f .env

