name: Test Solr Setup

on:
  push:
    branches: [ main, develop, "claude/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate .env file
      run: |
        docker compose --profile setup up moodle_setup

    - name: Build init container
      run: |
        docker compose build solr-init

    - name: Start Solr
      run: |
        docker compose up -d

    - name: Wait for Solr to be healthy
      run: |
        timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'

    - name: Show container status
      run: |
        docker compose ps
        docker compose logs solr

    - name: Run unit tests
      run: |
        chmod +x scripts/run-tests.sh
        ./scripts/run-tests.sh --unit-only

    - name: Run integration tests
      run: |
        ./scripts/run-tests.sh --integration-only

    - name: Run security tests
      run: |
        ./scripts/run-tests.sh --security-only

    - name: Run Moodle document tests
      run: |
        chmod +x scripts/test-moodle-documents.sh
        ./scripts/test-moodle-documents.sh

    - name: Show logs on failure
      if: failure()
      run: |
        docker compose logs

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v
