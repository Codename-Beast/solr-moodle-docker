name: Solr Test Suite

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run shellcheck on bash scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -type f -exec shellcheck -x {} +

      - name: Run hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Validate YAML files
        run: |
          sudo apt-get install -y yamllint
          yamllint -d "{extends: default, rules: {
            line-length: {max: 150},
            indentation: {spaces: consistent},
            document-start: disable,
            truthy: disable,
            brackets: {max-spaces-inside: 1}
          }}" .github/workflows/*.yml docker-compose.yml .gitlab-ci.yml

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build init container
        run: docker build -f Dockerfile -t solr-init:test .

      - name: Run Trivy vulnerability scanner on init image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'solr-init:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy on Solr base image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'solr:9.10.1'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  solr-test:
    name: Solr Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Create .env for testing
        run: |
          printf '%s\n' \
            'INSTANCE_NAME=solr' \
            'SOLR_VERSION=9.10.1' \
            'SOLR_PORT=8983' \
            'SOLR_BIND=127.0.0.1' \
            'SOLR_HEAP=2g' \
            'SOLR_LOG_LEVEL=INFO' \
            'SOLR_NETWORK_NAME=solr_network' \
            'SOLR_ADMIN_USER=admin' \
            'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
            'SOLR_SUPPORT_USER=support' \
            'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
            'SOLR_CPU_LIMIT=2' \
            'SOLR_MEMORY_LIMIT=4G' \
            'SOLR_CPU_RESERVATION=0.5' \
            'SOLR_MEMORY_RESERVATION=2G' \
            > .env
          touch tenants.env
          chmod 666 tenants.env
          sudo mkdir -p /var/log/solr
          sudo chmod 777 /var/log/solr

      - name: Build containers
        run: docker compose build solr-init solr

      - name: Start Solr
        run: |
          docker compose up -d
          timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting..."; done'
          echo "Solr is healthy"
          docker compose ps

      - name: Run unit tests
        run: |
          chmod +x scripts/run-tests.sh
          ./scripts/run-tests.sh --unit-only

      - name: Run integration tests
        run: ./scripts/run-tests.sh --integration-only --no-cleanup

      - name: Run security tests
        run: ./scripts/run-tests.sh --security-only --no-cleanup

      - name: Create test tenant for document tests
        run: |
          docker exec solr-solr /opt/solr/scripts/solr-tenant.sh create ci_test --cores moodle_core 2>&1 || true
          PASS=$(docker exec solr-solr grep 'TENANT_ci_test_PASS=' /opt/solr/tenants.env | cut -d= -f2)
          echo "SOLR_CORE_NAME=moodle_core" >> .env
          echo "CI_TENANT_PASS=$PASS" >> .env

      - name: Test Tika file extraction (/update/extract)
        run: |
          PASS=$(docker exec solr-solr grep 'TENANT_ci_test_PASS=' /opt/solr/tenants.env | cut -d= -f2)
          printf 'Moodle Tika extraction test — this line must be indexed.\n' > /tmp/tika_test.txt
          CODE=$(curl -so /dev/null -w '%{http_code}' \
            -u "solr_ci_test:$PASS" \
            -F "file=@/tmp/tika_test.txt" \
            "http://127.0.0.1:8983/solr/moodle_core/update/extract?extractOnly=true&wt=json")
          rm -f /tmp/tika_test.txt
          [ "$CODE" = "200" ] || { echo "FAIL: /update/extract returned HTTP $CODE (Tika not working)"; exit 1; }
          echo "PASS: Tika /update/extract (HTTP 200)"

      - name: Run Moodle document tests
        run: |
          chmod +x scripts/test-moodle-documents.sh
          ./scripts/test-moodle-documents.sh

      - name: Test automatic password generation
        run: |
          docker compose down -v
          printf '%s\n' \
            'INSTANCE_NAME=solr' \
            'SOLR_VERSION=9.10.1' \
            'SOLR_PORT=8983' \
            'SOLR_BIND=127.0.0.1' \
            'SOLR_HEAP=2g' \
            'SOLR_LOG_LEVEL=INFO' \
            'SOLR_NETWORK_NAME=solr_network' \
            'SOLR_ADMIN_USER=admin' \
            'SOLR_ADMIN_PASSWORD=CHANGE_ME_ADMIN' \
            'SOLR_SUPPORT_USER=support' \
            'SOLR_SUPPORT_PASSWORD=' \
            'SOLR_CPU_LIMIT=2' \
            'SOLR_MEMORY_LIMIT=4G' \
            'SOLR_CPU_RESERVATION=0.5' \
            'SOLR_MEMORY_RESERVATION=2G' \
            > .env
          docker compose build solr-init solr
          docker compose up -d
          for i in {1..30}; do
            if docker compose ps | grep -q healthy; then break; fi
            sleep 2
          done
          docker compose logs solr-init | grep -q "Generated" && echo "Password auto-gen PASSED" || exit 1
          docker compose down -v

      - name: Multi-tenant isolation test
        run: |
          printf '%s\n' \
            'INSTANCE_NAME=solr' \
            'SOLR_VERSION=9.10.1' \
            'SOLR_PORT=8983' \
            'SOLR_BIND=127.0.0.1' \
            'SOLR_HEAP=2g' \
            'SOLR_LOG_LEVEL=INFO' \
            'SOLR_NETWORK_NAME=solr_network' \
            'SOLR_ADMIN_USER=admin' \
            'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
            'SOLR_SUPPORT_USER=support' \
            'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
            'SOLR_CPU_LIMIT=2' \
            'SOLR_MEMORY_LIMIT=4G' \
            'SOLR_CPU_RESERVATION=0.5' \
            'SOLR_MEMORY_RESERVATION=2G' \
            > .env
          > tenants.env
          chmod 666 tenants.env
          docker compose build solr-init solr
          docker compose up -d
          timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'

          CONTAINER="solr-solr"
          TENANT_CMD="docker exec $CONTAINER /opt/solr/scripts/solr-tenant.sh"

          echo "Creating tenant_a..."
          $TENANT_CMD create tenant_a --cores core_a
          PASS_A=$(docker exec "$CONTAINER" grep 'TENANT_tenant_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)

          echo "Creating tenant_b..."
          $TENANT_CMD create tenant_b --cores core_b
          PASS_B=$(docker exec "$CONTAINER" grep 'TENANT_tenant_b_PASS=' /opt/solr/tenants.env | cut -d= -f2)

          echo "Testing tenant_a can access core_a..."
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:$PASS_A" \
            "http://127.0.0.1:8983/solr/core_a/select?q=*:*&rows=0")
          [ "$CODE" = "200" ] || { echo "FAIL: tenant_a cannot access core_a (HTTP $CODE)"; exit 1; }
          echo "PASS: tenant_a -> core_a (HTTP 200)"

          echo "Testing tenant_b can access core_b..."
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_b:$PASS_B" \
            "http://127.0.0.1:8983/solr/core_b/select?q=*:*&rows=0")
          [ "$CODE" = "200" ] || { echo "FAIL: tenant_b cannot access core_b (HTTP $CODE)"; exit 1; }
          echo "PASS: tenant_b -> core_b (HTTP 200)"

          # Authentication isolation: wrong credentials must be rejected (401).
          # Note: RuleBasedAuthorizationPlugin collection-field is SolrCloud-only.
          # Core-to-core URL isolation in standalone mode requires a reverse proxy
          # (e.g., Nginx) — that layer is out of scope for this unit test.
          echo "Testing authentication isolation: wrong password => 401..."
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:wrongpassword" \
            "http://127.0.0.1:8983/solr/core_a/select?q=*:*&rows=0")
          [ "$CODE" = "401" ] || { echo "FAIL: wrong password not rejected (HTTP $CODE)"; exit 1; }
          echo "PASS: Wrong password rejected (HTTP 401)"

          echo "Testing admin-API isolation: tenant_a cannot reach admin endpoints..."
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:$PASS_A" \
            "http://127.0.0.1:8983/solr/admin/cores?wt=json")
          [ "$CODE" = "403" ] || { echo "FAIL: tenant_a can access admin/cores (HTTP $CODE)"; exit 1; }
          echo "PASS: tenant_a blocked from /admin/cores (HTTP 403)"

          echo "Testing apply is idempotent..."
          $TENANT_CMD apply
          echo "PASS: apply completed"

          echo "Testing restart persistence..."
          docker compose restart solr
          sleep 30
          $TENANT_CMD list | grep -q "tenant_a" || { echo "FAIL: tenants lost after restart"; exit 1; }
          echo "PASS: Tenants persist after restart"

          docker compose down -v

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p logs
          docker compose logs > logs/docker-compose-all.log 2>&1 || true
          docker compose logs solr > logs/solr.log 2>&1 || true
          docker compose logs solr-init > logs/solr-init.log 2>&1 || true
          docker compose ps > logs/container-status.log 2>&1 || true

      - name: Upload logs as artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true
          rm -f .env tenants.env || true

  solrcloud-test:
    name: SolrCloud Mode Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: solr-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for SolrCloud testing
        run: |
          printf '%s\n' \
            'INSTANCE_NAME=solr' \
            'SOLR_VERSION=9.10.1' \
            'SOLR_PORT=8983' \
            'SOLR_BIND=127.0.0.1' \
            'SOLR_HEAP=2g' \
            'SOLR_LOG_LEVEL=INFO' \
            'SOLR_NETWORK_NAME=solr_network' \
            'SOLR_ADMIN_USER=admin' \
            'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
            'SOLR_SUPPORT_USER=support' \
            'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
            'SOLR_CPU_LIMIT=2' \
            'SOLR_MEMORY_LIMIT=4G' \
            'SOLR_CPU_RESERVATION=0.5' \
            'SOLR_MEMORY_RESERVATION=2G' \
            'SOLR_MODE=solrcloud' \
            > .env
          touch tenants.env
          chmod 666 tenants.env
          sudo mkdir -p /var/log/solr
          sudo chmod 777 /var/log/solr

      - name: Build and start SolrCloud
        run: |
          docker compose build solr-init solr
          docker compose up -d
          timeout 150 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting..."; done'
          echo "SolrCloud is healthy"
          docker compose ps

      - name: Verify SolrCloud mode active
        run: |
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "admin:CI_AdminPass_1234567890" \
            "http://127.0.0.1:8983/solr/admin/zookeeper?detail=true&path=%2F&wt=json")
          [ "$CODE" = "200" ] || { echo "FAIL: ZooKeeper API not reachable (HTTP $CODE)"; exit 1; }
          echo "PASS: Embedded ZooKeeper running (HTTP 200)"

      - name: Create tenant via Collections API
        run: |
          docker exec solr-solr /opt/solr/scripts/solr-tenant.sh create cloud_a --cores moodle_cloud_1
          PASS_A=$(docker exec solr-solr grep 'TENANT_cloud_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)
          echo "CLOUD_A_PASS=$PASS_A" >> .env

      - name: Verify collection exists and tenant can access it
        run: |
          PASS_A=$(docker exec solr-solr grep 'TENANT_cloud_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_cloud_a:$PASS_A" \
            "http://127.0.0.1:8983/solr/moodle_cloud_1/select?q=*:*&rows=0")
          [ "$CODE" = "200" ] || { echo "FAIL: tenant cannot access collection (HTTP $CODE)"; exit 1; }
          echo "PASS: tenant can access own collection (HTTP 200)"

      - name: Test true collection isolation (SolrCloud enforces collection field)
        run: |
          docker exec solr-solr /opt/solr/scripts/solr-tenant.sh create cloud_b --cores moodle_cloud_2
          PASS_A=$(docker exec solr-solr grep 'TENANT_cloud_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_cloud_a:$PASS_A" \
            "http://127.0.0.1:8983/solr/moodle_cloud_2/select?q=*:*&rows=0")
          [ "$CODE" = "403" ] || { echo "FAIL: isolation broken — cloud_a can access cloud_b collection (HTTP $CODE)"; exit 1; }
          echo "PASS: True collection isolation enforced by SolrCloud (HTTP 403)"

      - name: Index document and verify restart persistence
        run: |
          PASS_A=$(docker exec solr-solr grep 'TENANT_cloud_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)

          # Index a Moodle-format document (all required schema fields included)
          DOC='[{"id":"ci-persist-1","contextid":1,"courseid":1,"owneruserid":0,
                 "modified":"2026-01-01T00:00:00Z","type":0,"areaid":"core-user-myprofile",
                 "itemid":1,"content":"restart test content for CI persistence check"}]'
          CODE=$(curl -so /dev/null -w '%{http_code}' \
            -u "solr_cloud_a:$PASS_A" \
            -X POST -H 'Content-Type: application/json' \
            -d "$DOC" \
            "http://127.0.0.1:8983/solr/moodle_cloud_1/update?commit=true")
          [ "$CODE" = "200" ] || { echo "FAIL: indexing failed (HTTP $CODE)"; exit 1; }
          echo "PASS: Moodle document indexed"

          echo "Restarting Solr container..."
          docker compose restart solr
          timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting..."; done'

          # Verify document survives restart (index data in named volume)
          RESP=$(curl -s -u "solr_cloud_a:$PASS_A" \
            "http://127.0.0.1:8983/solr/moodle_cloud_1/select?q=id:ci-persist-1&wt=json")
          echo "$RESP" | grep -q '"numFound":1' || { echo "FAIL: document lost after restart"; exit 1; }
          echo "PASS: Document survives Solr restart (ZK + index persistence confirmed)"

          # Verify collection still listed
          RESP=$(curl -s -u "admin:CI_AdminPass_1234567890" \
            "http://127.0.0.1:8983/solr/admin/collections?action=LIST&wt=json")
          echo "$RESP" | grep -q '"moodle_cloud_1"' || { echo "FAIL: collection lost after restart"; exit 1; }
          echo "PASS: Collection persists after restart"

          # Verify isolation still holds after restart
          CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_cloud_a:$PASS_A" \
            "http://127.0.0.1:8983/solr/moodle_cloud_2/select?q=*:*&rows=0")
          [ "$CODE" = "403" ] || { echo "FAIL: isolation broken after restart (HTTP $CODE)"; exit 1; }
          echo "PASS: Isolation holds after restart"

      - name: Test Tika file extraction in SolrCloud
        run: |
          PASS_A=$(docker exec solr-solr grep 'TENANT_cloud_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)
          printf 'Moodle Tika extraction test in SolrCloud mode.\n' > /tmp/tika_cloud_test.txt
          CODE=$(curl -so /dev/null -w '%{http_code}' \
            -u "solr_cloud_a:$PASS_A" \
            -F "file=@/tmp/tika_cloud_test.txt" \
            "http://127.0.0.1:8983/solr/moodle_cloud_1/update/extract?extractOnly=true&wt=json")
          rm -f /tmp/tika_cloud_test.txt
          [ "$CODE" = "200" ] || { echo "FAIL: /update/extract HTTP $CODE in SolrCloud"; exit 1; }
          echo "PASS: Tika /update/extract in SolrCloud (HTTP 200)"

      - name: Generate Caddy config
        run: |
          docker exec solr-solr /opt/solr/scripts/solr-tenant.sh caddy-config \
            --domain solr.example.com
          echo "PASS: Caddy config generated"

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p logs
          docker compose logs > logs/docker-compose-cloud.log 2>&1 || true
          docker compose ps > logs/container-status.log 2>&1 || true

      - name: Upload logs as artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-test-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true
          rm -f .env tenants.env || true
