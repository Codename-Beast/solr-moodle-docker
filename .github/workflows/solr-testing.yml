name: Solr Testing

on:
  push:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'main'
  pull_request:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - name: Lint shell scripts
      run: |
        sudo apt-get install -y shellcheck
        find scripts/ -name "*.sh" -exec shellcheck -S warning {} +
    - name: Validate docker-compose.yml
      run: docker compose config --quiet

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - name: Build Solr image
      run: docker build -f Dockerfile.solr -t solr-eledia:test --build-arg SOLR_VERSION=9.10.1 .
    - name: Trivy image scan
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy:latest image --severity CRITICAL,HIGH --exit-code 0 solr-eledia:test

  solr-test:
    name: SolrCloud Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan
    steps:
    - uses: actions/checkout@v6

    - name: Create host log directory
      run: |
        sudo mkdir -p /var/log/eledia/solr
        sudo chmod -R 777 /var/log/eledia

    - name: Create .env
      run: |
        cat > .env <<'EOF'
        INSTANCE_NAME=solr
        SOLR_VERSION=9.10.1
        SOLR_PORT=8983
        SOLR_BIND=127.0.0.1
        SOLR_HEAP=2g
        SOLR_LOG_LEVEL=INFO
        SOLR_NETWORK_NAME=solr_network
        SOLR_ADMIN_USER=admin
        SOLR_ADMIN_PASSWORD=CI_AdminPass1234567890
        SOLR_SUPPORT_USER=support
        SOLR_SUPPORT_PASSWORD=CI_SupportPass1234567890
        SOLR_CPU_LIMIT=2
        SOLR_MEMORY_LIMIT=4G
        SOLR_CPU_RESERVATION=0.5
        SOLR_MEMORY_RESERVATION=2G
        SOLR_MODE=solrcloud
        ELEDIA_LOG_ROOT=/var/log/eledia
        EOF
        touch tenants.env
        chmod 666 tenants.env

    - name: Build and start Solr (SolrCloud)
      run: |
        docker compose build solr
        docker compose up -d
        timeout 120 bash -c \
          'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting for healthy..."; done'
        echo "Solr is healthy"

    - name: Create CI tenant + core
      run: |
        docker exec solr-solr /opt/solr/scripts/solr-tenant.sh create ci_test \
          --cores eLeDia_core 2>&1 || true
        PASS=$(docker exec solr-solr grep 'TENANT_CI_TEST_PASS=' /opt/solr/tenants.env \
          | cut -d= -f2 || echo "")
        echo "SOLR_CORE_NAME=eLeDia_core" >> .env
        echo "CI_TENANT_PASS=${PASS}" >> .env

    - name: Run tests
      run: bash scripts/run-tests.sh --cloud --tenant

    - name: Collect logs on failure
      if: failure()
      run: |
        mkdir -p logs
        docker compose logs --no-color > logs/docker-compose.log 2>&1 || true
        docker compose ps > logs/container-status.log 2>&1 || true

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: solr-test-logs-${{ github.run_id }}
        path: logs/
        retention-days: 7

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v || true
        rm -f .env tenants.env || true

  solrcloud-test:
    name: SolrCloud Tenant Isolation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan
    steps:
    - uses: actions/checkout@v6

    - name: Create host log directory
      run: |
        sudo mkdir -p /var/log/eledia/solr
        sudo chmod -R 777 /var/log/eledia

    - name: Create .env (SolrCloud + multi-tenant)
      run: |
        cat > .env <<'EOF'
        INSTANCE_NAME=solr
        SOLR_VERSION=9.10.1
        SOLR_PORT=8983
        SOLR_BIND=127.0.0.1
        SOLR_HEAP=2g
        SOLR_LOG_LEVEL=INFO
        SOLR_NETWORK_NAME=solr_network
        SOLR_ADMIN_USER=admin
        SOLR_ADMIN_PASSWORD=CI_AdminPass1234567890
        SOLR_SUPPORT_USER=support
        SOLR_SUPPORT_PASSWORD=CI_SupportPass1234567890
        SOLR_CPU_LIMIT=2
        SOLR_MEMORY_LIMIT=4G
        SOLR_CPU_RESERVATION=0.5
        SOLR_MEMORY_RESERVATION=2G
        SOLR_MODE=solrcloud
        ELEDIA_LOG_ROOT=/var/log/eledia
        EOF
        touch tenants.env
        chmod 666 tenants.env

    - name: Build and start SolrCloud
      run: |
        docker compose build solr
        docker compose up -d
        timeout 120 bash -c \
          'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting..."; done'

    - name: Run SolrCloud tenant isolation tests
      run: bash scripts/run-tests.sh --cloud --tenant --tenant-scale

    - name: Collect logs on failure
      if: failure()
      run: |
        mkdir -p logs
        docker compose logs --no-color > logs/docker-compose.log 2>&1 || true

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: solrcloud-test-logs-${{ github.run_id }}
        path: logs/
        retention-days: 7

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v || true
        rm -f .env tenants.env || true
