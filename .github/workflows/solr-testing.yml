name: Solr Test Suite

on:
  push:
    branches: [main, develop, develop22]
  pull_request:
    branches: [main, develop, develop22]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================
  # STAGE 1: Validation (all parallel)
  # =========================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          find . -name "*.sh" -type f -exec shellcheck -x {} +

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  apache-config-test:
    name: Apache Config
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Test config generator
        run: |
          chmod +x apache/generate-apache-config.sh
          ./apache/generate-apache-config.sh --instance test-a --hostname solr-a.example.com --port 8983
          ./apache/generate-apache-config.sh --instance test-b --hostname solr-b.example.com --port 8984
          test -f apache/generated/solr-test-a.conf && test -f apache/generated/solr-test-b.conf
          ! grep -q '{{' apache/generated/solr-test-a.conf

      - name: Validate Apache syntax
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace httpd:2.4-alpine sh -c '
            apk add --no-cache openssl >/dev/null 2>&1

            # Create mock SSL certs
            mkdir -p /etc/letsencrypt/live/example.com
            openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
              -keyout /etc/letsencrypt/live/example.com/privkey.pem \
              -out /etc/letsencrypt/live/example.com/fullchain.pem \
              -subj "/CN=example.com" 2>/dev/null

            # Setup Apache directories
            mkdir -p /usr/local/apache2/conf-available /usr/local/apache2/sites-available /usr/local/apache2/logs

            # Create SSL config with correct cert paths
            sed "s|YOURDOMAIN.COM|example.com|g" apache/ssl-common.conf > /usr/local/apache2/conf-available/ssl-common.conf

            # Copy and fix VHost configs:
            # 1. Replace Include path with absolute path
            # 2. Replace ${APACHE_LOG_DIR} with /usr/local/apache2/logs (httpd-alpine path)
            for f in apache/generated/*.conf; do
              sed -e "s|Include conf-available/ssl-common.conf|Include /usr/local/apache2/conf-available/ssl-common.conf|g" \
                  -e "s|\${APACHE_LOG_DIR}|/usr/local/apache2/logs|g" \
                  "$f" > "/usr/local/apache2/sites-available/$(basename $f)"
            done

            # Add modules and includes to httpd.conf
            cat >> /usr/local/apache2/conf/httpd.conf <<EOF
            ServerName localhost
            LoadModule ssl_module modules/mod_ssl.so
            LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
            LoadModule proxy_module modules/mod_proxy.so
            LoadModule proxy_http_module modules/mod_proxy_http.so
            LoadModule rewrite_module modules/mod_rewrite.so
            SSLSessionCache shmcb:/usr/local/apache2/logs/ssl_scache(512000)
            SSLStaplingCache shmcb:/usr/local/apache2/logs/ssl_stapling(128000)
            Include sites-available/*.conf
          EOF

            httpd -t
          '

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Build init container
        run: docker build -f Dockerfile -t solr-init:test . -q

      - name: Trivy scan init image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'solr-init:test'
          severity: 'CRITICAL'
          exit-code: '0'

      - name: Trivy scan Solr image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'solr:9.10.0'
          severity: 'CRITICAL'
          exit-code: '0'

  # =========================================
  # STAGE 2: Tests (all parallel)
  # =========================================
  solr-core-test:
    name: Core Tests (${{ matrix.core_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [lint, security-scan]
    strategy:
      fail-fast: false
      matrix:
        core_name: [moodle_core, custom_test_core]

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: chmod +x scripts/*.sh 2>/dev/null || true

      - name: Generate .env
        run: |
          SOLR_CORE_NAME=${{ matrix.core_name }} docker compose --profile setup up moodle_setup
          grep SOLR_CORE_NAME .env

      - name: Build and start Solr
        run: |
          docker compose build solr-init -q
          docker compose up -d
          timeout 180 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'

      - name: Run tests
        run: |
          ./scripts/run-tests.sh --unit-only
          ./scripts/run-tests.sh --integration-only --no-cleanup
          ./scripts/run-tests.sh --security-only --no-cleanup
          ./scripts/test-moodle-documents.sh

      - name: Collect logs
        if: failure()
        run: |
          mkdir -p logs
          docker compose logs > logs/all.log 2>&1 || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.core_name }}
          path: logs/
          retention-days: 3

      - name: Cleanup
        if: always()
        run: docker compose down -v 2>/dev/null || true

  solr-feature-test:
    name: Feature Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, security-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: chmod +x scripts/*.sh 2>/dev/null || true

      - name: Test password auto-generation
        run: |
          cat > .env <<'EOF'
          INSTANCE_NAME=solr
          SOLR_VERSION=9.10.0
          SOLR_PORT=8983
          SOLR_BIND=127.0.0.1
          SOLR_CORE_NAME=test_auto_core
          SOLR_CORES=
          SOLR_HEAP=2g
          SOLR_LOG_LEVEL=INFO
          SOLR_NETWORK_NAME=solr_network
          SOLR_ADMIN_USER=admin
          SOLR_ADMIN_PASSWORD=CHANGE_ME_ADMIN
          SOLR_SUPPORT_USER=support
          SOLR_SUPPORT_PASSWORD=
          SOLR_MOODLE_USER=moodle
          SOLR_MOODLE_PASSWORD=CHANGE_ME_PASSWORD
          MONITORING_BIND_IP=127.0.0.1
          SOLR_METRICS_PORT=9854
          PROMETHEUS_PORT=9090
          PROMETHEUS_BIND=127.0.0.1
          GRAFANA_PORT=3000
          GRAFANA_BIND=127.0.0.1
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=admin
          EOF
          # Remove leading whitespace from .env
          sed -i 's/^[[:space:]]*//' .env
          docker compose build solr-init -q
          docker compose up -d
          timeout 180 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
          docker compose logs solr-init | grep -q "Generated secure password"
          echo "Password auto-generation test PASSED"
          docker compose down -v

      - name: Test dynamic core management
        run: |
          cat > .env <<'EOF'
          INSTANCE_NAME=solr
          SOLR_VERSION=9.10.0
          SOLR_PORT=8983
          SOLR_BIND=127.0.0.1
          SOLR_CORE_NAME=
          SOLR_CORES=test_core1,test_core2
          SOLR_HEAP=2g
          SOLR_LOG_LEVEL=INFO
          SOLR_NETWORK_NAME=solr_network
          SOLR_ADMIN_USER=admin
          SOLR_ADMIN_PASSWORD=test123
          SOLR_SUPPORT_USER=support
          SOLR_SUPPORT_PASSWORD=test123
          SOLR_MOODLE_USER=moodle
          SOLR_MOODLE_PASSWORD=test123
          MONITORING_BIND_IP=127.0.0.1
          SOLR_METRICS_PORT=9854
          PROMETHEUS_PORT=9090
          PROMETHEUS_BIND=127.0.0.1
          GRAFANA_PORT=3000
          GRAFANA_BIND=127.0.0.1
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=admin
          EOF
          # Remove leading whitespace from .env
          sed -i 's/^[[:space:]]*//' .env
          docker compose build solr-init -q
          docker compose up -d
          timeout 180 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
          docker compose logs solr-init | grep "Creating core 'test_core1'"
          docker compose logs solr-init | grep "Creating core 'test_core2'"

          # Add core
          sed -i 's/SOLR_CORES=test_core1,test_core2/SOLR_CORES=test_core1,test_core2,test_core3/' .env
          docker compose down && docker compose up -d
          timeout 180 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
          docker compose logs solr-init | grep "Creating core 'test_core3'"

          # Remove core
          sed -i 's/SOLR_CORES=test_core1,test_core2,test_core3/SOLR_CORES=test_core1,test_core3/' .env
          docker compose down && docker compose up -d
          timeout 180 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
          docker compose logs solr-init | grep "Deleting core 'test_core2'"
          echo "Dynamic core management test PASSED"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v 2>/dev/null || true
          rm -f .env
