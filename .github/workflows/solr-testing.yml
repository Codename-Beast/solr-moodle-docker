name: Solr Testing

on:
  push:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'main'
  pull_request:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - name: Lint shell scripts
      run: |
        sudo apt-get install -y shellcheck
        find scripts/ -name "*.sh" -exec shellcheck -S warning {} +
    - name: Validate docker-compose.yml
      run: |
        cp .env.example .env
        touch tenants.env
        docker compose config --quiet
        rm -f .env tenants.env

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - name: Build Solr image
      run: docker build -f Dockerfile.solr -t solr-eledia:test --build-arg SOLR_VERSION=9.10.1 .
    - name: Trivy image scan
      run: |
        # Fail closed for new CRITICAL findings. Accepted upstream Solr bundled
        # Java dependency findings are documented in .trivyignore.
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v "${PWD}/.trivyignore:/workspace/.trivyignore:ro" \
          aquasec/trivy:latest image --ignorefile /workspace/.trivyignore \
          --severity CRITICAL --exit-code 1 solr-eledia:test

  standalone-test:
    name: Standalone Core Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan
    steps:
    - uses: actions/checkout@v6

    - name: Create host log directory
      run: |
        sudo mkdir -p /var/log/eledia/ci-standalone
        sudo chmod -R 777 /var/log/eledia

    - name: Create .env
      env:
        CI_ADMIN_PW: ${{ secrets.SOLR_CI_ADMIN_PASSWORD }}
        CI_SUPPORT_PW: ${{ secrets.SOLR_CI_SUPPORT_PASSWORD }}
      run: |
        cp .env.example .env
        sed -i 's/^INSTANCE_NAME=.*/INSTANCE_NAME=ci-standalone/' .env
        sed -i 's/^SOLR_MODE=.*/SOLR_MODE=standalone/' .env
        sed -i 's/^SOLR_PORT=.*/SOLR_PORT=18993/' .env
        sed -i "s/^SOLR_ADMIN_PASSWORD=.*/SOLR_ADMIN_PASSWORD=${CI_ADMIN_PW}/" .env
        sed -i "s/^SOLR_SUPPORT_PASSWORD=.*/SOLR_SUPPORT_PASSWORD=${CI_SUPPORT_PW}/" .env
        echo 'ELEDIA_LOG_ROOT=/var/log/eledia' >> .env
        touch tenants.env
        chmod 666 tenants.env

    - name: Build and start Solr (Standalone Core)
      run: |
        docker compose build eLeDia-solr-init solr
        docker compose up -d
        echo "Waiting for ci-standalone-solr to become healthy (max 12 x 15s = 180s)..."
        for i in $(seq 1 12); do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' ci-standalone-solr 2>/dev/null || echo "missing")
          echo "  attempt $i/12: $STATUS"
          [ "$STATUS" = "healthy" ] && echo "Solr is healthy" && break
          [ "$i" = "12" ] && echo "ERROR: not healthy after 180s" && docker compose logs --no-color && exit 1
          sleep 15
        done

    - name: Run standalone core tests
      run: |
        set -o pipefail
        bash scripts/run-tests.sh --tenant --no-performance 2>&1 | tee /tmp/standalone-core-tests.log
        if grep '\[FAIL\]' /tmp/standalone-core-tests.log | grep -v 'echo "ERROR: test output contains'; then
          echo "ERROR: test output contains [FAIL] lines"
          exit 1
        fi

    - name: Collect logs on failure
      if: failure()
      run: |
        mkdir -p logs
        docker compose logs --no-color > logs/docker-compose-standalone.log 2>&1 || true
        docker compose ps > logs/container-status-standalone.log 2>&1 || true

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: standalone-test-logs-${{ github.run_id }}
        path: logs/
        retention-days: 7

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v || true
        rm -f .env tenants.env || true

  solr-test:
    name: SolrCloud Tests (combined)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan
    steps:
    - uses: actions/checkout@v6

    - name: Create host log directory
      run: |
        sudo mkdir -p /var/log/eledia/ci-solr
        sudo chmod -R 777 /var/log/eledia

    - name: Create .env
      env:
        CI_ADMIN_PW: ${{ secrets.SOLR_CI_ADMIN_PASSWORD }}
        CI_SUPPORT_PW: ${{ secrets.SOLR_CI_SUPPORT_PASSWORD }}
      run: |
        cp .env.example .env
        sed -i 's/^INSTANCE_NAME=.*/INSTANCE_NAME=ci-solr/' .env
        sed -i 's/^SOLR_MODE=.*/SOLR_MODE=solrcloud/'       .env
        sed -i "s/^SOLR_ADMIN_PASSWORD=.*/SOLR_ADMIN_PASSWORD=${CI_ADMIN_PW}/"     .env
        sed -i "s/^SOLR_SUPPORT_PASSWORD=.*/SOLR_SUPPORT_PASSWORD=${CI_SUPPORT_PW}/" .env
        echo 'ELEDIA_LOG_ROOT=/var/log/eledia' >> .env
        touch tenants.env
        chmod 666 tenants.env

    - name: Build and start Solr (SolrCloud)
      run: |
        docker compose build eLeDia-solr-init solr
        docker compose up -d
        echo "Waiting for ci-solr-solr to become healthy (max 10 x 20s = 200s)..."
        for i in $(seq 1 10); do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' ci-solr-solr 2>/dev/null || echo "missing")
          echo "  attempt $i/10: $STATUS"
          [ "$STATUS" = "healthy" ] && echo "Solr is healthy" && break
          [ "$i" = "10" ] && echo "ERROR: not healthy after 200s" && docker compose logs --no-color && exit 1
          sleep 20
        done


    - name: Run core SolrCloud tests
      run: |
        set -o pipefail
        bash scripts/run-tests.sh --cloud --tenant --no-performance 2>&1 | tee /tmp/solr-core-tests.log
        if grep -q '\[FAIL\]' /tmp/solr-core-tests.log; then
          echo "ERROR: test output contains [FAIL] lines"
          exit 1
        fi

    - name: Run SolrCloud tenant isolation scale tests
      run: |
        set -o pipefail
        bash scripts/run-tests.sh --cloud --tenant --tenant-scale --no-performance 2>&1 | tee /tmp/solr-scale-tests.log
        if grep -q '\[FAIL\]' /tmp/solr-scale-tests.log; then
          echo "ERROR: test output contains [FAIL] lines"
          exit 1
        fi

    - name: Collect logs on failure
      if: failure()
      run: |
        mkdir -p logs
        docker compose logs --no-color > logs/docker-compose.log 2>&1 || true
        docker compose ps > logs/container-status.log 2>&1 || true

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: solr-test-logs-${{ github.run_id }}
        path: logs/
        retention-days: 7

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v || true
        rm -f .env tenants.env || true

