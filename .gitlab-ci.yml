image: ubuntu:22.04

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  COMPOSE_PROJECT_NAME: solr_test
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

stages:
  - security
  - test

# Security scan uses Docker socket sharing (same runner pattern as solr-test).
# Docker-in-Docker (docker:24-dind) is intentionally avoided: the runner host
# uses overlayfs, which makes nested overlay mounts fail in DinD containers
# (err: invalid argument).
security-scan:
  stage: security
  image: ubuntu:22.04
  tags:
    - docker
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl ca-certificates docker.io
    - docker info
  script:
    - echo "Building init container for security scan..."
    - docker build -f Dockerfile -t solr-init:test .
    - echo "Running Trivy vulnerability scanner on init image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL solr-init:test || true
    - echo "Running Trivy vulnerability scanner on Solr base image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL solr:9.10.1 || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
  timeout: 15 minutes

.test-template:
  stage: test
  tags:
    - docker
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  cache:
    key: docker-compose-cache
    paths:
      - .cache/docker
    policy: pull-push

solr-test:
  extends: .test-template

  parallel:
    matrix:
      - SOLR_CORE_NAME: moodle_core
      - SOLR_CORE_NAME: custom_test_core

  needs:
    - security-scan

  before_script:
    - echo "Installing dependencies for Ubuntu $(lsb_release -rs || cat /etc/os-release | grep VERSION_ID)"
    - apt-get update -qq
    - apt-get install -y -qq curl jq docker-compose-plugin docker.io ||
      apt-get install -y -qq curl jq docker-compose docker.io
    - echo "Ubuntu environment ready"
    - echo "Docker version:" $(docker --version)
    - echo "Docker Compose version:" $(docker compose version)
    - chmod +x scripts/run-tests.sh scripts/test-moodle-documents.sh

  script:
    - echo "Generating .env file with core name:" $SOLR_CORE_NAME
    - SOLR_CORE_NAME=$SOLR_CORE_NAME docker compose --profile setup up moodle_setup
    - echo ".env file created successfully"
    - ls -lah .env
    - echo "Core name in .env:"
    - grep SOLR_CORE_NAME .env

    - echo "Building init container..."
    - docker compose build solr-init

    - echo "Starting Solr containers..."
    - docker compose up -d

    - echo "Waiting for Solr to be healthy (max 2 minutes)..."
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Still waiting..."; done'
    - echo "Solr is healthy"

    - echo "Container status:"
    - docker compose ps
    - echo ""
    - echo "Solr logs (last 50 lines):"
    - docker compose logs --tail=50 solr

    - echo "Running unit tests..."
    - ./scripts/run-tests.sh --unit-only

    - echo "Running integration tests..."
    - ./scripts/run-tests.sh --integration-only --no-cleanup

    - echo "Running security tests..."
    - ./scripts/run-tests.sh --security-only --no-cleanup

    - echo "Running Moodle document tests..."
    - ./scripts/test-moodle-documents.sh

    - echo "Testing automatic password generation..."
    - docker compose down -v
    - rm -f .env
    - |
      cat > .env <<'EOF'
      INSTANCE_NAME=solr
      SOLR_VERSION=9.10.1
      SOLR_PORT=8983
      SOLR_BIND=127.0.0.1
      SOLR_CORE_NAME=test_auto_core
      SOLR_CORES=
      SOLR_HEAP=2g
      SOLR_LOG_LEVEL=INFO
      SOLR_NETWORK_NAME=solr_network
      SOLR_ADMIN_USER=admin
      SOLR_ADMIN_PASSWORD=CHANGE_ME_ADMIN
      SOLR_SUPPORT_USER=support
      SOLR_SUPPORT_PASSWORD=
      SOLR_MOODLE_USER=moodle
      SOLR_MOODLE_PASSWORD=CHANGE_ME_PASSWORD
      MONITORING_BIND_IP=127.0.0.1
      SOLR_METRICS_PORT=9854
      PROMETHEUS_PORT=9090
      PROMETHEUS_BIND=127.0.0.1
      GRAFANA_PORT=3000
      GRAFANA_BIND=127.0.0.1
      GRAFANA_ADMIN_USER=admin
      GRAFANA_ADMIN_PASSWORD=admin
      EOF
    - docker compose build solr-init
    - docker compose up -d
    - |
      echo "Waiting for containers to be healthy..."
      for i in {1..30}; do
        if docker compose ps | grep -q healthy; then
          echo "Containers are healthy after attempt ${i}"
          break
        fi
        sleep 2
      done
    - echo "Checking init container logs..."
    - docker compose logs solr-init
    - docker compose logs solr-init | grep -q "Generated secure password" || exit 1
    - echo "Password auto-generation test PASSED"
    - docker compose down -v

    - echo "Testing dynamic core management..."
    - rm -f .env
    - |
      cat > .env <<EOF
      INSTANCE_NAME=solr
      SOLR_VERSION=9.10.1
      SOLR_PORT=8983
      SOLR_BIND=127.0.0.1
      SOLR_CORE_NAME=
      SOLR_CORES=test_core1,test_core2
      SOLR_HEAP=2g
      SOLR_LOG_LEVEL=INFO
      SOLR_NETWORK_NAME=solr_network
      SOLR_ADMIN_USER=admin
      SOLR_ADMIN_PASSWORD=test123
      SOLR_SUPPORT_USER=support
      SOLR_SUPPORT_PASSWORD=test123
      SOLR_MOODLE_USER=moodle
      SOLR_MOODLE_PASSWORD=test123
      MONITORING_BIND_IP=127.0.0.1
      SOLR_METRICS_PORT=9854
      PROMETHEUS_PORT=9090
      PROMETHEUS_BIND=127.0.0.1
      GRAFANA_PORT=3000
      GRAFANA_BIND=127.0.0.1
      GRAFANA_ADMIN_USER=admin
      GRAFANA_ADMIN_PASSWORD=admin
      EOF
    - docker compose build solr-init
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
    - docker compose logs solr-init | grep "Creating core 'test_core1'" || exit 1
    - docker compose logs solr-init | grep "Creating core 'test_core2'" || exit 1
    - sed -i 's/SOLR_CORES=test_core1,test_core2/SOLR_CORES=test_core1,test_core2,test_core3/' .env
    - docker compose down
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
    - docker compose logs solr-init | grep "Creating core 'test_core3'" || exit 1
    - sed -i 's/SOLR_CORES=test_core1,test_core2,test_core3/SOLR_CORES=test_core1,test_core3/' .env
    - docker compose down
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'
    - docker compose logs solr-init | grep "Deleting core 'test_core2'" || exit 1
    - echo "Dynamic core management test PASSED"
    - docker compose down -v

  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "Tests failed. Collecting logs..."
        mkdir -p logs
        docker compose logs > logs/docker-compose-all.log 2>&1 || true
        docker compose logs solr > logs/solr.log 2>&1 || true
        docker compose logs solr-init > logs/solr-init.log 2>&1 || true
        docker compose ps > logs/container-status.log 2>&1 || true
        docker inspect $(docker compose ps -q) > logs/container-inspect.log 2>&1 || true
      fi
    - echo "Cleaning up..."
    - docker compose down -v || true
    - rm -f .env || true

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

  artifacts:
    when: on_failure
    paths:
      - .env
      - logs/
    expire_in: 7 days

  timeout: 15 minutes
