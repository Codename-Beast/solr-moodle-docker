stages:
  - lint
  - test

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""

default:
  tags:
    - docker
    - dind

main-minimal:
  stage: lint
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash docker-cli docker-cli-compose
    - cp -f .env.example .env
  script:
    - docker compose config >/dev/null
    - for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done

feature-lint:
  stage: lint
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/v[0-9].*/'
    - if: '$CI_COMMIT_BRANCH =~ /^release.*/'
  before_script:
    - apk add --no-cache bash docker-cli docker-cli-compose
    - cp -f .env.example .env
  script:
    - docker compose config >/dev/null
    - for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done

feature-full-test:
  stage: test
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/v[0-9].*/'
    - if: '$CI_COMMIT_BRANCH =~ /^release.*/'
  before_script:
    - apk add --no-cache bash curl docker-cli docker-cli-compose
    - cp -f .env.example .env
    - sed -i 's/^SOLR_MODE=.*/SOLR_MODE=standalone/' .env || true
    - sed -i 's/^INSTANCE_NAME=.*/INSTANCE_NAME=solr/' .env || true
    - touch tenants.env
  script:
    - bash scripts/run-tests.sh
  after_script:
    - docker compose down -v || true
    - rm -f .env tenants.env || true
