################################################################################
# GitLab CI — solr-moodle-docker
#
# Runner-Tag konfigurierbar über GitLab-Variable:
#   Settings → CI/CD → Variables → CI_RUNNER_TAG = <euer Runner-Name>
#   Beispiel: xen-04, docker-runner, privileged-runner, …
#   Default (lokal): docker
#
# Max. 2 parallele Jobs (runner concurrent=2), Timeout je 10 Minuten.
################################################################################

---
stages:
  - lint
  - test

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""
  # ↓ Euren Runner-Namen hier oder via GitLab-Variable setzen
  CI_RUNNER_TAG: 'docker'

default:
  tags:
    - $CI_RUNNER_TAG

# ---------------------------------------------------------------------------
# Stage: lint
# ---------------------------------------------------------------------------
main-minimal:
  stage: lint
  image: alpine:3.20
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash docker-cli docker-cli-compose
    - cp -f .env.example .env
  script:
    - docker compose config >/dev/null
    - for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done

feature-lint:
  stage: lint
  image: alpine:3.20
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/(v)?[0-9].*/'
    - if: '$CI_COMMIT_BRANCH =~ /^release.*/'
  before_script:
    - apk add --no-cache bash docker-cli docker-cli-compose
    - cp -f .env.example .env
  script:
    - docker compose config >/dev/null
    - for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------
feature-full-test:
  stage: test
  image: alpine:3.20
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/(v)?[0-9].*/'
    - if: '$CI_COMMIT_BRANCH =~ /^release.*/'
  before_script:
    - apk add --no-cache bash curl docker-cli docker-cli-compose openssl python3
    - cp -f .env.example .env
    - sed -i 's/^SOLR_MODE=.*/SOLR_MODE=solrcloud/' .env || true
    - sed -i 's/^INSTANCE_NAME=.*/INSTANCE_NAME=solr/' .env || true
    - sed -i 's#^TENANTS_ENV=.*#TENANTS_ENV=/var/solr/data/tenants.env#' .env || echo 'TENANTS_ENV=/var/solr/data/tenants.env' >> .env
    - sed -i "s/^SOLR_ADMIN_PASSWORD=.*/SOLR_ADMIN_PASSWORD=$(openssl rand -hex 20)/" .env
    - sed -i "s/^SOLR_SUPPORT_PASSWORD=.*/SOLR_SUPPORT_PASSWORD=$(openssl rand -hex 20)/" .env
    - touch tenants.env
    - chmod 666 tenants.env
    - mkdir -p /var/log/eledia/solr && chmod 777 /var/log/eledia/solr
  script:
    - docker compose build eLeDia-solr-init solr
    - docker compose up -d
    - >-
      for i in $(seq 1 10); do
        STATUS=$(docker inspect --format='{{.State.Health.Status}}' solr-solr 2>/dev/null || echo "missing");
        echo "attempt $i/10: $STATUS";
        [ "$STATUS" = "healthy" ] && break;
        [ "$i" = "10" ] && docker compose logs --no-color && exit 1;
        sleep 20;
      done
    - bash scripts/run-tests.sh --cloud --no-performance --no-cleanup
  after_script:
    - docker compose down -v || true
    - rm -f .env tenants.env || true
