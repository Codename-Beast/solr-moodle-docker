################################################################################
# GitLab CI — solr-moodle-docker
#
# Runner-Tag konfigurierbar über GitLab-Variable:
#   Settings → CI/CD → Variables → CI_RUNNER_TAG = <euer Runner-Name>
#   Beispiel: xen-04, docker-runner, privileged-runner, …
#   Default (lokal): docker
#
# Max. 2 parallele Jobs (runner concurrent=2), Timeout je 10 Minuten.
################################################################################

---
stages:
  - lint
  - test

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""
  # ↓ Euren Runner-Namen hier oder via GitLab-Variable setzen
  CI_RUNNER_TAG: 'docker'

default:
  tags:
    - $CI_RUNNER_TAG

# ---------------------------------------------------------------------------
# Stage: lint
# ---------------------------------------------------------------------------
main-minimal:
  stage: lint
  image: alpine:3.20
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash docker-cli docker-cli-compose
    - cp -f .env.example .env
  script:
    - docker compose config >/dev/null
    - for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done

feature-lint:
  stage: lint
  image: alpine:3.20
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/v[0-9].*/'
    - if: '$CI_COMMIT_BRANCH =~ /^release.*/'
  before_script:
    - apk add --no-cache bash docker-cli docker-cli-compose
    - cp -f .env.example .env
  script:
    - docker compose config >/dev/null
    - for f in $(find . -name "*.sh" -type f); do bash -n "$f"; done

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------
feature-full-test:
  stage: test
  image: alpine:3.20
  timeout: 10 minutes
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/v[0-9].*/'
    - if: '$CI_COMMIT_BRANCH =~ /^release.*/'
  before_script:
    - apk add --no-cache bash curl docker-cli docker-cli-compose python3
    - cp -f .env.example .env
    - sed -i 's/^SOLR_MODE=.*/SOLR_MODE=standalone/' .env || true
    - sed -i 's/^INSTANCE_NAME=.*/INSTANCE_NAME=solr/' .env || true
    - touch tenants.env
  script:
    - bash scripts/run-tests.sh --unit-only --no-cleanup
  after_script:
    - docker compose down -v || true
    - rm -f .env tenants.env || true
