image: ubuntu:22.04

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  COMPOSE_PROJECT_NAME: solr_test
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"
  GIT_STRATEGY: clone
  GIT_DEPTH: 1
  DOCKER_VERSION: "5:24.0.7-1~ubuntu.22.04~jammy"

stages:
  - validate
  - test

# =========================================
# Shared Templates
# =========================================
.docker-template:
  tags:
    - docker
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

.solr-setup: &solr-setup
  - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl jq docker-compose-plugin docker.io 2>/dev/null || apt-get install -y -qq curl jq docker-compose docker.io
  - chmod +x scripts/run-tests.sh scripts/test-moodle-documents.sh 2>/dev/null || true

# =========================================
# VALIDATE Stage (parallel)
# =========================================
apache-config-test:
  stage: validate
  image: httpd:2.4-alpine
  extends: .docker-template
  timeout: 3 minutes
  needs: []
  script:
    - apk add --no-cache bash openssl >/dev/null
    - chmod +x apache/generate-apache-config.sh
    - ./apache/generate-apache-config.sh --instance test-a --hostname solr-a.example.com --port 8983
    - ./apache/generate-apache-config.sh --instance test-b --hostname solr-b.example.com --port 8984
    - test -f apache/generated/solr-test-a.conf && test -f apache/generated/solr-test-b.conf
    - "! grep -q '{{' apache/generated/solr-test-a.conf"
    # Quick SSL mock and syntax test
    - mkdir -p /etc/letsencrypt/live/example.com
    - openssl req -x509 -nodes -days 1 -newkey rsa:2048 -keyout /etc/letsencrypt/live/example.com/privkey.pem -out /etc/letsencrypt/live/example.com/fullchain.pem -subj "/CN=example.com" 2>/dev/null
    - mkdir -p /usr/local/apache2/conf/conf-available /usr/local/apache2/conf/sites-available
    - sed 's|YOURDOMAIN.COM|example.com|g' apache/ssl-common.conf > /usr/local/apache2/conf/conf-available/ssl-common.conf
    - cp apache/generated/*.conf /usr/local/apache2/conf/sites-available/
    - |
      cat >> /usr/local/apache2/conf/httpd.conf <<'EOF'
      LoadModule ssl_module modules/mod_ssl.so
      LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
      LoadModule proxy_module modules/mod_proxy.so
      LoadModule proxy_http_module modules/mod_proxy_http.so
      LoadModule headers_module modules/mod_headers.so
      LoadModule rewrite_module modules/mod_rewrite.so
      SSLSessionCache shmcb:/usr/local/apache2/logs/ssl_scache(512000)
      SSLStaplingCache shmcb:/usr/local/apache2/logs/ssl_stapling(128000)
      Include conf/conf-available/ssl-common.conf
      Include conf/sites-available/*.conf
      EOF
    - httpd -t
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop22"'
    - changes:
        - apache/**/*

security-scan:
  stage: validate
  image: docker:24-git
  extends: .docker-template
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  timeout: 10 minutes
  needs: []
  script:
    - apk add --no-cache curl >/dev/null
    - sleep 3 && docker info >/dev/null
    - docker build -f Dockerfile -t solr-init:test . -q
    # Run scans in parallel using background processes
    - |
      docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity CRITICAL --no-progress solr-init:test || true &
      docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity CRITICAL --no-progress solr:9.10.0 || true &
      wait
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop22"'

# =========================================
# TEST Stage (parallel)
# =========================================
solr-core-test:
  stage: test
  extends: .docker-template
  needs: []  # Run parallel to validate stage
  parallel:
    matrix:
      - SOLR_CORE_NAME: moodle_core
      - SOLR_CORE_NAME: custom_test_core
  before_script:
    - *solr-setup
  script:
    - SOLR_CORE_NAME=$SOLR_CORE_NAME docker compose --profile setup up moodle_setup
    - docker compose build solr-init -q
    - docker compose up -d
    - timeout 90 bash -c 'until docker compose ps | grep -q healthy; do sleep 2; done'
    - ./scripts/run-tests.sh --unit-only
    - ./scripts/run-tests.sh --integration-only --no-cleanup
    - ./scripts/run-tests.sh --security-only --no-cleanup
    - ./scripts/test-moodle-documents.sh
  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        mkdir -p logs
        docker compose logs > logs/docker-compose-all.log 2>&1 || true
      fi
    - docker compose down -v 2>/dev/null || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop22"'
  artifacts:
    when: on_failure
    paths:
      - logs/
    expire_in: 3 days
  timeout: 8 minutes

solr-feature-test:
  stage: test
  extends: .docker-template
  needs: []  # Run parallel to validate stage
  before_script:
    - *solr-setup
  script:
    # Test 1: Automatic password generation
    - echo "=== Password Auto-Generation Test ==="
    - |
      cat > .env <<'EOF'
      INSTANCE_NAME=solr
      SOLR_VERSION=9.10.0
      SOLR_PORT=8983
      SOLR_BIND=127.0.0.1
      SOLR_CORE_NAME=test_auto_core
      SOLR_CORES=
      SOLR_HEAP=2g
      SOLR_LOG_LEVEL=INFO
      SOLR_NETWORK_NAME=solr_network
      SOLR_ADMIN_USER=admin
      SOLR_ADMIN_PASSWORD=CHANGE_ME_ADMIN
      SOLR_SUPPORT_USER=support
      SOLR_SUPPORT_PASSWORD=
      SOLR_MOODLE_USER=moodle
      SOLR_MOODLE_PASSWORD=CHANGE_ME_PASSWORD
      MONITORING_BIND_IP=127.0.0.1
      SOLR_METRICS_PORT=9854
      PROMETHEUS_PORT=9090
      PROMETHEUS_BIND=127.0.0.1
      GRAFANA_PORT=3000
      GRAFANA_BIND=127.0.0.1
      GRAFANA_ADMIN_USER=admin
      GRAFANA_ADMIN_PASSWORD=admin
      EOF
    - docker compose build solr-init -q
    - docker compose up -d
    - timeout 60 bash -c 'until docker compose ps | grep -q healthy; do sleep 2; done'
    - docker compose logs solr-init | grep -q "Generated secure password"
    - echo "Password auto-generation test PASSED"
    - docker compose down -v

    # Test 2: Dynamic core management
    - echo "=== Dynamic Core Management Test ==="
    - |
      cat > .env <<'EOF'
      INSTANCE_NAME=solr
      SOLR_VERSION=9.10.0
      SOLR_PORT=8983
      SOLR_BIND=127.0.0.1
      SOLR_CORE_NAME=
      SOLR_CORES=test_core1,test_core2
      SOLR_HEAP=2g
      SOLR_LOG_LEVEL=INFO
      SOLR_NETWORK_NAME=solr_network
      SOLR_ADMIN_USER=admin
      SOLR_ADMIN_PASSWORD=test123
      SOLR_SUPPORT_USER=support
      SOLR_SUPPORT_PASSWORD=test123
      SOLR_MOODLE_USER=moodle
      SOLR_MOODLE_PASSWORD=test123
      MONITORING_BIND_IP=127.0.0.1
      SOLR_METRICS_PORT=9854
      PROMETHEUS_PORT=9090
      PROMETHEUS_BIND=127.0.0.1
      GRAFANA_PORT=3000
      GRAFANA_BIND=127.0.0.1
      GRAFANA_ADMIN_USER=admin
      GRAFANA_ADMIN_PASSWORD=admin
      EOF
    - docker compose build solr-init -q
    - docker compose up -d
    - timeout 60 bash -c 'until docker compose ps | grep -q healthy; do sleep 2; done'
    - docker compose logs solr-init | grep "Creating core 'test_core1'"
    - docker compose logs solr-init | grep "Creating core 'test_core2'"
    # Add core
    - sed -i 's/SOLR_CORES=test_core1,test_core2/SOLR_CORES=test_core1,test_core2,test_core3/' .env
    - docker compose down && docker compose up -d
    - timeout 60 bash -c 'until docker compose ps | grep -q healthy; do sleep 2; done'
    - docker compose logs solr-init | grep "Creating core 'test_core3'"
    # Remove core
    - sed -i 's/SOLR_CORES=test_core1,test_core2,test_core3/SOLR_CORES=test_core1,test_core3/' .env
    - docker compose down && docker compose up -d
    - timeout 60 bash -c 'until docker compose ps | grep -q healthy; do sleep 2; done'
    - docker compose logs solr-init | grep "Deleting core 'test_core2'"
    - echo "Dynamic core management test PASSED"
  after_script:
    - docker compose down -v 2>/dev/null || true
    - rm -f .env
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop22"'
  timeout: 6 minutes
