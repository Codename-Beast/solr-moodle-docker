image: ubuntu:22.04

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  COMPOSE_PROJECT_NAME: solr_test
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"
  GIT_STRATEGY: clone
  GIT_DEPTH: 1
  DOCKER_VERSION: "5:24.0.7-1~ubuntu.22.04~jammy"

stages:
  - security
  - test
  - tenant-test
  - solrcloud-test

security-scan:
  stage: security
  image: docker:24-git
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  tags:
    - docker
  timeout: 15 minutes
  needs: []
  before_script:
    - apk add --no-cache curl
    - sleep 5
    - docker info || exit 1
  script:
    - echo "Building init container for security scan..."
    - docker build -f Dockerfile -t solr-init:test .
    - echo "Running Trivy vulnerability scanner on init image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL solr-init:test || true
    - echo "Running Trivy vulnerability scanner on Solr base image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL solr:9.10.1 || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

.test-template:
  stage: test
  tags:
    - docker
  interruptible: true
  needs:
    - security-scan
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl jq docker-compose-plugin=${DOCKER_VERSION} docker.io=${DOCKER_VERSION} ||
      apt-get install -y -qq curl jq docker-compose docker.io
    - chmod +x scripts/run-tests.sh scripts/test-moodle-documents.sh scripts/solr-tenant.sh

solr-test:
  extends: .test-template

  script:
    - |
      printf '%s\n' \
        'INSTANCE_NAME=solr' \
        'SOLR_VERSION=9.10.1' \
        'SOLR_PORT=8983' \
        'SOLR_BIND=127.0.0.1' \
        'SOLR_HEAP=2g' \
        'SOLR_LOG_LEVEL=INFO' \
        'SOLR_NETWORK_NAME=solr_network' \
        'SOLR_ADMIN_USER=admin' \
        'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
        'SOLR_SUPPORT_USER=support' \
        'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
        'SOLR_CPU_LIMIT=2' \
        'SOLR_MEMORY_LIMIT=4G' \
        'SOLR_CPU_RESERVATION=0.5' \
        'SOLR_MEMORY_RESERVATION=2G' \
        > .env
      touch tenants.env
      mkdir -p /var/log/solr
    - docker compose build solr-init
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting..."; done'
    - docker compose ps
    - ./scripts/run-tests.sh --unit-only
    - ./scripts/run-tests.sh --integration-only --no-cleanup
    - ./scripts/run-tests.sh --security-only --no-cleanup
    - docker exec solr-solr /opt/solr/scripts/solr-tenant.sh create ci_test --cores moodle_core
    - echo "SOLR_CORE_NAME=moodle_core" >> .env
    - ./scripts/test-moodle-documents.sh

  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        mkdir -p logs
        docker compose logs > logs/docker-compose-all.log 2>&1 || true
        docker compose logs solr > logs/solr.log 2>&1 || true
        docker compose logs solr-init > logs/solr-init.log 2>&1 || true
        docker compose ps > logs/container-status.log 2>&1 || true
      fi
    - docker compose down -v || true
    - rm -f .env tenants.env || true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

  artifacts:
    when: on_failure
    paths:
      - logs/
    expire_in: 7 days

  timeout: 15 minutes

tenant-test:
  stage: tenant-test
  extends: .test-template
  needs:
    - solr-test

  script:
    - |
      printf '%s\n' \
        'INSTANCE_NAME=solr' \
        'SOLR_VERSION=9.10.1' \
        'SOLR_PORT=8983' \
        'SOLR_BIND=127.0.0.1' \
        'SOLR_HEAP=2g' \
        'SOLR_LOG_LEVEL=INFO' \
        'SOLR_NETWORK_NAME=solr_network' \
        'SOLR_ADMIN_USER=admin' \
        'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
        'SOLR_SUPPORT_USER=support' \
        'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
        'SOLR_CPU_LIMIT=2' \
        'SOLR_MEMORY_LIMIT=4G' \
        'SOLR_CPU_RESERVATION=0.5' \
        'SOLR_MEMORY_RESERVATION=2G' \
        > .env
      touch tenants.env
      mkdir -p /var/log/solr
    - docker compose build solr-init
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'

    - CONTAINER="solr-solr"
    - TENANT_CMD="docker exec $CONTAINER /opt/solr/scripts/solr-tenant.sh"

    - echo "Creating tenant_a..."
    - $TENANT_CMD create tenant_a --cores core_a
    - PASS_A=$(docker exec "$CONTAINER" grep 'TENANT_tenant_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)

    - echo "Creating tenant_b..."
    - $TENANT_CMD create tenant_b --cores core_b
    - PASS_B=$(docker exec "$CONTAINER" grep 'TENANT_tenant_b_PASS=' /opt/solr/tenants.env | cut -d= -f2)

    - echo "Testing tenant_a -> core_a (expect 200)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:$PASS_A" \
        "http://127.0.0.1:8983/solr/core_a/select?q=*:*&rows=0")
      [ "$CODE" = "200" ] || { echo "FAIL: HTTP $CODE"; exit 1; }
      echo "PASS"

    # In standalone mode, Solr does not enforce core-level isolation — the collection
    # field in RuleBasedAuthorizationPlugin is only evaluated in SolrCloud mode.
    # URL-level isolation is delegated to the Caddy reverse proxy.
    # We test authentication isolation (wrong password → 401) and admin API blocking (→ 403) instead.
    - echo "Testing auth isolation: wrong password => 401..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:wrongpassword" \
        "http://127.0.0.1:8983/solr/core_a/select?q=*:*&rows=0")
      [ "$CODE" = "401" ] || { echo "FAIL: expected 401 got HTTP $CODE"; exit 1; }
      echo "PASS: Auth isolation OK (wrong password rejected)"

    - echo "Testing admin API blocked for tenant (expect 403)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:$PASS_A" \
        "http://127.0.0.1:8983/solr/admin/cores")
      [ "$CODE" = "403" ] || { echo "FAIL: admin API not blocked HTTP $CODE"; exit 1; }
      echo "PASS: Admin API blocked for tenant (HTTP 403)"

    - echo "Testing support can read (expect 200)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "support:CI_SupportPass_1234567890" \
        "http://127.0.0.1:8983/solr/core_a/select?q=*:*&rows=0")
      [ "$CODE" = "200" ] || { echo "FAIL: support read failed HTTP $CODE"; exit 1; }
      echo "PASS: Support can read (HTTP 200)"

    - echo "Testing support CANNOT write (expect 403)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "support:CI_SupportPass_1234567890" \
        -X POST "http://127.0.0.1:8983/solr/core_a/update" \
        -H "Content-Type: application/json" -d '{"commit":{}}')
      [ "$CODE" = "403" ] || { echo "FAIL: support can write HTTP $CODE (expected 403)"; exit 1; }
      echo "PASS: Support cannot write (HTTP 403)"

    - echo "Testing apply is idempotent..."
    - $TENANT_CMD apply
    - echo "PASS"

    - echo "Testing restart persistence..."
    - docker compose restart solr
    - sleep 30
    - $TENANT_CMD list | grep -q "tenant_a" || { echo "FAIL: tenants lost after restart"; exit 1; }
    - echo "PASS: Tenants persisted"

  after_script:
    - docker compose down -v || true
    - rm -f .env tenants.env || true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

  timeout: 20 minutes

# SolrCloud mode: embedded ZooKeeper, true collection-level authorization.
# Validates that SOLR_MODE=solrcloud activates SolrCloud and tenant isolation
# works at the collection level (not via Caddy URL routing).
solrcloud-test:
  stage: solrcloud-test
  extends: .test-template
  needs:
    - tenant-test

  script:
    - |
      printf '%s\n' \
        'INSTANCE_NAME=solr' \
        'SOLR_VERSION=9.10.1' \
        'SOLR_PORT=8983' \
        'SOLR_BIND=127.0.0.1' \
        'SOLR_HEAP=2g' \
        'SOLR_LOG_LEVEL=INFO' \
        'SOLR_NETWORK_NAME=solr_network' \
        'SOLR_ADMIN_USER=admin' \
        'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
        'SOLR_SUPPORT_USER=support' \
        'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
        'SOLR_CPU_LIMIT=2' \
        'SOLR_MEMORY_LIMIT=4G' \
        'SOLR_CPU_RESERVATION=0.5' \
        'SOLR_MEMORY_RESERVATION=2G' \
        'SOLR_MODE=solrcloud' \
        > .env
      touch tenants.env
      mkdir -p /var/log/solr
    - docker compose build solr-init
    - docker compose up -d
    - timeout 180 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting for SolrCloud..."; done'
    - docker compose ps

    - CONTAINER="solr-solr"
    - TENANT_CMD="docker exec $CONTAINER /opt/solr/scripts/solr-tenant.sh"

    - echo "Verifying SolrCloud mode is active..."
    - |
      STATUS=$(curl -sf -u "admin:CI_AdminPass_1234567890" \
        "http://127.0.0.1:8983/solr/admin/collections?action=clusterstatus&wt=json" | \
        python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if 'cluster' in d else 'fail')" 2>/dev/null || echo "fail")
      [ "$STATUS" = "ok" ] && echo "PASS: SolrCloud cluster active" || { echo "FAIL: Not in SolrCloud mode"; exit 1; }

    - echo "Creating tenants in SolrCloud mode..."
    - $TENANT_CMD create cloud_a --cores col_a
    - $TENANT_CMD create cloud_b --cores col_b
    - PASS_A=$(docker exec "$CONTAINER" grep 'TENANT_cloud_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)

    - echo "Testing cloud_a -> col_a (expect 200)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_cloud_a:$PASS_A" \
        "http://127.0.0.1:8983/solr/col_a/select?q=*:*&rows=0")
      [ "$CODE" = "200" ] || { echo "FAIL: HTTP $CODE"; exit 1; }
      echo "PASS"

    - echo "Testing SolrCloud isolation: cloud_a cannot access col_b (expect 403)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_cloud_a:$PASS_A" \
        "http://127.0.0.1:8983/solr/col_b/select?q=*:*&rows=0")
      [ "$CODE" = "403" ] || { echo "FAIL: isolation broken HTTP $CODE"; exit 1; }
      echo "PASS: SolrCloud isolation OK"

    - echo "Testing PDF indexing via Tika (/update/extract)..."
    - |
      echo "This is a test PDF content for Solr Tika extraction" > /tmp/test.txt
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_cloud_a:$PASS_A" \
        -F "file=@/tmp/test.txt" \
        "http://127.0.0.1:8983/solr/col_a/update/extract?extractOnly=true&wt=json")
      [ "$CODE" = "200" ] && echo "PASS: Tika extraction OK" || echo "WARN: Tika returned HTTP $CODE"
      rm -f /tmp/test.txt

    - echo "Testing apply idempotent in SolrCloud mode..."
    - $TENANT_CMD apply
    - echo "PASS"

  after_script:
    - docker compose down -v || true
    - rm -f .env tenants.env || true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

  timeout: 25 minutes
