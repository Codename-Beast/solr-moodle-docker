image: ubuntu:22.04

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  COMPOSE_PROJECT_NAME: solr_test
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"
  GIT_STRATEGY: clone
  GIT_DEPTH: 1
  DOCKER_VERSION: "5:24.0.7-1~ubuntu.22.04~jammy"

stages:
  - security
  - test
  - tenant-test

security-scan:
  stage: security
  image: docker:24-git
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  tags:
    - docker
  timeout: 15 minutes
  needs: []
  before_script:
    - apk add --no-cache curl
    - sleep 5
    - docker info || exit 1
  script:
    - echo "Building init container for security scan..."
    - docker build -f Dockerfile -t solr-init:test .
    - echo "Running Trivy vulnerability scanner on init image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL solr-init:test || true
    - echo "Running Trivy vulnerability scanner on Solr base image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL solr:9.10.1 || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

.test-template:
  stage: test
  tags:
    - docker
  interruptible: true
  needs:
    - security-scan
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl jq docker-compose-plugin=${DOCKER_VERSION} docker.io=${DOCKER_VERSION} ||
      apt-get install -y -qq curl jq docker-compose docker.io
    - chmod +x scripts/run-tests.sh scripts/test-moodle-documents.sh scripts/solr-tenant.sh

solr-test:
  extends: .test-template

  script:
    - |
      printf '%s\n' \
        'INSTANCE_NAME=solr' \
        'SOLR_VERSION=9.10.1' \
        'SOLR_PORT=8983' \
        'SOLR_BIND=127.0.0.1' \
        'SOLR_HEAP=2g' \
        'SOLR_LOG_LEVEL=INFO' \
        'SOLR_NETWORK_NAME=solr_network' \
        'SOLR_ADMIN_USER=admin' \
        'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
        'SOLR_SUPPORT_USER=support' \
        'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
        'SOLR_CPU_LIMIT=2' \
        'SOLR_MEMORY_LIMIT=4G' \
        'SOLR_CPU_RESERVATION=0.5' \
        'SOLR_MEMORY_RESERVATION=2G' \
        > .env
      touch tenants.env
      mkdir -p /var/log/solr
    - docker compose build solr-init
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Waiting..."; done'
    - docker compose ps
    - ./scripts/run-tests.sh --unit-only
    - ./scripts/run-tests.sh --integration-only --no-cleanup
    - ./scripts/run-tests.sh --security-only --no-cleanup
    - docker exec solr-solr /opt/solr/scripts/solr-tenant.sh create ci_test --cores moodle_core
    - echo "SOLR_CORE_NAME=moodle_core" >> .env
    - ./scripts/test-moodle-documents.sh

  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        mkdir -p logs
        docker compose logs > logs/docker-compose-all.log 2>&1 || true
        docker compose logs solr > logs/solr.log 2>&1 || true
        docker compose logs solr-init > logs/solr-init.log 2>&1 || true
        docker compose ps > logs/container-status.log 2>&1 || true
      fi
    - docker compose down -v || true
    - rm -f .env tenants.env || true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

  artifacts:
    when: on_failure
    paths:
      - logs/
    expire_in: 7 days

  timeout: 15 minutes

tenant-test:
  stage: tenant-test
  extends: .test-template
  needs:
    - solr-test

  script:
    - |
      printf '%s\n' \
        'INSTANCE_NAME=solr' \
        'SOLR_VERSION=9.10.1' \
        'SOLR_PORT=8983' \
        'SOLR_BIND=127.0.0.1' \
        'SOLR_HEAP=2g' \
        'SOLR_LOG_LEVEL=INFO' \
        'SOLR_NETWORK_NAME=solr_network' \
        'SOLR_ADMIN_USER=admin' \
        'SOLR_ADMIN_PASSWORD=CI_AdminPass_1234567890' \
        'SOLR_SUPPORT_USER=support' \
        'SOLR_SUPPORT_PASSWORD=CI_SupportPass_1234567890' \
        'SOLR_CPU_LIMIT=2' \
        'SOLR_MEMORY_LIMIT=4G' \
        'SOLR_CPU_RESERVATION=0.5' \
        'SOLR_MEMORY_RESERVATION=2G' \
        > .env
      touch tenants.env
      mkdir -p /var/log/solr
    - docker compose build solr-init
    - docker compose up -d
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; done'

    - CONTAINER="solr-solr"
    - TENANT_CMD="docker exec $CONTAINER /opt/solr/scripts/solr-tenant.sh"

    - echo "Creating tenant_a..."
    - $TENANT_CMD create tenant_a --cores core_a
    - PASS_A=$(docker exec "$CONTAINER" grep 'TENANT_tenant_a_PASS=' /opt/solr/tenants.env | cut -d= -f2)

    - echo "Creating tenant_b..."
    - $TENANT_CMD create tenant_b --cores core_b
    - PASS_B=$(docker exec "$CONTAINER" grep 'TENANT_tenant_b_PASS=' /opt/solr/tenants.env | cut -d= -f2)

    - echo "Testing tenant_a -> core_a (expect 200)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:$PASS_A" \
        "http://127.0.0.1:8983/solr/core_a/select?q=*:*&rows=0")
      [ "$CODE" = "200" ] || { echo "FAIL: HTTP $CODE"; exit 1; }
      echo "PASS"

    - echo "Testing isolation: tenant_a cannot access core_b (expect 403)..."
    - |
      CODE=$(curl -so /dev/null -w '%{http_code}' -u "solr_tenant_a:$PASS_A" \
        "http://127.0.0.1:8983/solr/core_b/select?q=*:*&rows=0")
      [ "$CODE" = "403" ] || { echo "FAIL: isolation broken HTTP $CODE"; exit 1; }
      echo "PASS: Isolation OK"

    - echo "Testing apply is idempotent..."
    - $TENANT_CMD apply
    - echo "PASS"

    - echo "Testing restart persistence..."
    - docker compose restart solr
    - sleep 30
    - $TENANT_CMD list | grep -q "tenant_a" || { echo "FAIL: tenants lost after restart"; exit 1; }
    - echo "PASS: Tenants persisted"

  after_script:
    - docker compose down -v || true
    - rm -f .env tenants.env || true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

  timeout: 20 minutes
