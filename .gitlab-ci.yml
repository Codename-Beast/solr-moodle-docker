image: ubuntu:22.04

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  COMPOSE_PROJECT_NAME: solr_test
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"

stages:
  - test

solr-test:
  stage: test
  tags:
    - docker

  parallel:
    matrix:
      - SOLR_CORE_NAME: moodle_core
      - SOLR_CORE_NAME: custom_test_core

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl jq docker-compose-plugin docker.io
    - echo "Ubuntu environment ready"
    - echo "Docker version:" $(docker --version)
    - echo "Docker Compose version:" $(docker compose version)
    - chmod +x scripts/run-tests.sh scripts/test-moodle-documents.sh

  script:
    - echo "Generating .env file with core name:" $SOLR_CORE_NAME
    - SOLR_CORE_NAME=$SOLR_CORE_NAME docker compose --profile setup up moodle_setup
    - echo ".env file created successfully"
    - ls -lah .env
    - echo "Core name in .env:"
    - grep SOLR_CORE_NAME .env

    - echo "Building init container..."
    - docker compose build solr-init

    - echo "Starting Solr containers..."
    - docker compose up -d

    - echo "Waiting for Solr to be healthy (max 2 minutes)..."
    - timeout 120 bash -c 'until docker compose ps | grep -q healthy; do sleep 5; echo "Still waiting..."; done'
    - echo "Solr is healthy"

    - echo "Container status:"
    - docker compose ps
    - echo ""
    - echo "Solr logs (last 50 lines):"
    - docker compose logs --tail=50 solr

    - echo "Running unit tests..."
    - ./scripts/run-tests.sh --unit-only

    - echo "Running integration tests..."
    - ./scripts/run-tests.sh --integration-only --no-cleanup

    - echo "Running security tests..."
    - ./scripts/run-tests.sh --security-only --no-cleanup

    - echo "Running Moodle document tests..."
    - ./scripts/test-moodle-documents.sh

  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "Tests failed. Showing logs..."
        echo ""
        echo "All container logs:"
        docker compose logs || true
        echo ""
        echo "Container status:"
        docker compose ps || true
      fi
    - echo "Cleaning up..."
    - docker compose down -v || true
    - rm -f .env || true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^develop/'
    - if: '$CI_COMMIT_BRANCH =~ /^claude\//'

  artifacts:
    when: on_failure
    paths:
      - .env
    expire_in: 1 day

  timeout: 20 minutes
