# Init container is reintroduced as global bootstrap worker:
#   service: eLeDia-solr-init
# It prepares security.json + default configsets before runtime starts.
#
# Host log root default:
#   /var/log/eledia/solr/<INSTANCE_NAME>/
# =========================================

services:
  # =================================
  # [BOOTSTRAP] Global Init container
  # eLeDia-solr-init creates/refreshes:
  #   - security.json
  #   - eLeDia-moodle-tenant configset + _default
  #   - optional multi-target bootstrap metadata
  # Exits 0 on success.
  # =================================
  eLeDia-solr-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: eledia-solr-init:v3.4.6
    container_name: ${INSTANCE_NAME:-solr}-eLeDia-solr-init
    user: "0:0"
    volumes:
      - solr_data:/var/solr/data
      - ./.env:/.env:ro,z
      - ./tenants.env:/opt/solr/tenants.env:rw
      - ./eLeDia-config:/config:ro
      - ${ELEDIA_LOG_ROOT:-/var/log/eledia/solr}/${INSTANCE_NAME:-solr}:/var/log/solr:z
    env_file:
      - .env
    environment:
      ENV_FILE_PATH: /.env
      SOLR_MODE: ${SOLR_MODE:-solrcloud}
      TENANTS_ENV: ${TENANTS_ENV:-/opt/solr/tenants.env}
      # Optional comma-separated runtime targets (for globalized init orchestration metadata)
      INIT_TARGETS: ${INIT_TARGETS:-solr-a,solr-b,solr-c}
    networks:
      - solr_network
    restart: "no"

  # =================================
  # Solr SolrCloud Runtime
  # =================================
  solr:
    depends_on:
      eLeDia-solr-init:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile.solr
      args:
        SOLR_VERSION: ${SOLR_VERSION:-9.10.1}
    image: solr-eledia:${SOLR_VERSION:-9.10.1}
    container_name: ${INSTANCE_NAME:-solr}-solr
    command: ["/opt/solr/docker/scripts/solr-cloud-entrypoint.sh"]
    user: "0:0"
    ports:
      # SECURITY: SOLR_BIND MUST stay 127.0.0.1 — never bind to 0.0.0.0.
      # External access goes through the reverse proxy (Apache/Caddy) with TLS.
      - "${SOLR_BIND:-127.0.0.1}:${SOLR_PORT:-8983}:${SOLR_PORT:-8983}"
    volumes:
      - solr_data:/var/solr/data
      # tenants.env: source of truth for tenant CRUD operations
      - ./tenants.env:/opt/solr/tenants.env:rw
      # eLeDia-config: schema + solrconfig source for configset upload
      - ./eLeDia-config:/opt/solr/eledia-config:ro
      # Host log mount — all Solr logs go to /var/log/eledia/<instance>/
      # so Promtail, syslog, and ops tooling can scrape them directly.
      - ${ELEDIA_LOG_ROOT:-/var/log/eledia}/${INSTANCE_NAME:-solr}:/var/log/solr:z
    env_file:
      - .env
    environment:
      SOLR_HEAP: ${SOLR_HEAP:-2g}
      SOLR_LOG_LEVEL: ${SOLR_LOG_LEVEL:-INFO}
      # SolrCloud is the default. Leave SOLR_MODE unset or set to solrcloud.
      SOLR_MODE: ${SOLR_MODE:-solrcloud}
      # Tika extraction for Moodle file indexing (/update/extract)
      SOLR_MODULES: ${SOLR_MODULES:-extraction}
      SOLR_JETTY_GRACEFUL: ${SOLR_JETTY_GRACEFUL:-true}
      SOLR_LOGS_REQUESTLOG_ENABLED: ${SOLR_LOGS_REQUESTLOG_ENABLED:-false}
      SOLR_SECURITY_MANAGER_ENABLED: ${SOLR_SECURITY_MANAGER_ENABLED:-false}
      # Tenant SOT path override for Docker-in-Docker CI where file bind mounts are not reliable.
      TENANTS_ENV: ${TENANTS_ENV:-/opt/solr/tenants.env}
      SOLR_OPTS: >-
        -XX:-UseLargePages
        -Dsolr.usage.analytics.enabled=false
        -Dsolr.responses.stacktrace.enabled=false
        -Dsolr.security.allow.urls.enabled=false
        ${SOLR_JAVA_OPTS:-}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '${SOLR_CPU_LIMIT:-2}'
          memory: ${SOLR_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${SOLR_CPU_RESERVATION:-0.5}'
          memory: ${SOLR_MEMORY_RESERVATION:-2G}
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          curl -sf -u "$${SOLR_ADMIN_USER}:$${SOLR_ADMIN_PASSWORD}"
          http://localhost:${SOLR_PORT:-8983}/solr/admin/info/system >/dev/null &&
          [ "$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${SOLR_PORT:-8983}/solr/admin/authentication)" = "401" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

# =================================
# Volumes
# =================================
volumes:
  solr_data:
    name: solr_data_${INSTANCE_NAME:-solr}

# =================================
# Network
# =================================
networks:
  solr_network:
    name: ${INSTANCE_NAME:-solr}-network
    driver: bridge
