services:
  # =================================
  # [SETUP] Generate .env
  # =================================
  moodle_setup:
    image: alpine:3.20
    profiles: ["setup"]
    container_name: ${INSTANCE_NAME:-solr}-setup
    working_dir: /app
    volumes:
      - ./init:/init:ro,z
      - ./:/app:z
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
    entrypoint: ["/bin/sh", "/init/generate_env.sh"]
    environment:
      INSTANCE_NAME: ${INSTANCE_NAME:-solr}
      SOLR_CORE_NAME: ${SOLR_CORE_NAME:-}
    restart: "no"

  # =================================
  # [BOOTSTRAP]
  # =================================
  solr-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: solr-init:v2.3.2
    container_name: ${INSTANCE_NAME:-solr}-init
    user: "0:0"
    volumes:
      - solr_data:/var/solr/data:z
      - ./.env:/.env:ro,z
    env_file:
      - .env
    environment:
      ENV_FILE_PATH: /.env
    networks:
      - solr_network
    restart: "no"
  # =================================
  # Main service
  # =================================
  solr:
    image: solr:${SOLR_VERSION:-9.10.1}
    container_name: ${INSTANCE_NAME:-solr}-solr
    depends_on:
      solr-init:
        condition: service_completed_successfully
    ports:
      # SECURITY: SOLR_BIND MUST stay 127.0.0.1 — never bind to 0.0.0.0.
      # External access goes through the reverse proxy (nginx/apache) with TLS.
      - "${SOLR_BIND:-127.0.0.1}:${SOLR_PORT:-8983}:${SOLR_PORT:-8983}"
    user: "8983:8983"
    volumes:
      - solr_data:/var/solr/data:z
    env_file:
      - .env
    environment:
      SOLR_HEAP: ${SOLR_HEAP:-2g}
      SOLR_LOG_LEVEL: ${SOLR_LOG_LEVEL:-INFO}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '${SOLR_CPU_LIMIT:-2}'
          memory: ${SOLR_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${SOLR_CPU_RESERVATION:-0.5}'
          memory: ${SOLR_MEMORY_RESERVATION:-2G}
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          curl -sf -u "$${SOLR_ADMIN_USER}:$${SOLR_ADMIN_PASSWORD}"
          http://localhost:${SOLR_PORT:-8983}/solr/admin/info/system || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  # =================================
  # [MONITORING] Solr Prometheus Exporter
  # Optional — activate with: docker compose --profile monitoring up -d
  # Ref: https://solr.apache.org/guide/solr/latest/deployment-guide/monitoring-with-prometheus-and-grafana.html
  # Metrics endpoint: http://127.0.0.1:SOLR_EXPORTER_PORT/metrics
  # =================================
  solr-exporter:
    image: solr:${SOLR_VERSION:-9.10.1}
    container_name: ${INSTANCE_NAME:-solr}-solr-exporter
    profiles: ["monitoring"]
    command:
      - "/opt/solr/prometheus-exporter/bin/solr-exporter"
      - "-p"
      - "8989"
      - "-b"
      - "http://${INSTANCE_NAME:-solr}-solr:${SOLR_PORT:-8983}/solr"
      - "-u"
      - "${SOLR_ADMIN_USER}:${SOLR_ADMIN_PASSWORD}"
      - "--cluster-id"
      - "${INSTANCE_NAME:-solr}"
      - "--num-threads"
      - "4"
    ports:
      - "127.0.0.1:${SOLR_EXPORTER_PORT:-8989}:8989"
    env_file:
      - .env
    networks:
      - solr_network
    depends_on:
      solr:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# =================================
# Volumes
# =================================
volumes:
  solr_data:
    name: solr_data_${INSTANCE_NAME:-solr}

# =================================
# Network
# =================================
networks:
  solr_network:
    name: ${INSTANCE_NAME:-solr}-network
    driver: bridge
