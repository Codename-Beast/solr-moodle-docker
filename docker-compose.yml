# Solr for Moodle — Multi-Tenant
# Developer: Bernd Schreistetter
# Company: Eledia.de
# Version: v3.0.1
# =========================================

services:
  # =================================
  # [BOOTSTRAP] Init container
  # Builds security.json from .env + tenants.env
  # Exits 0 on success, Solr only starts if init succeeds
  # =================================
  solr-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: solr-init:v3.0.0
    container_name: ${INSTANCE_NAME:-solr}-init
    user: "0:0"
    volumes:
      - solr_data:/var/solr/data
      - ./.env:/.env:ro,z
      - ./tenants.env:/opt/solr/tenants.env:ro,z
      - ${SOLR_LOG_INSTANCES_ROOT:-/var/log/solr/instances}/${INSTANCE_NAME:-solr}-init:/var/log/solr:z
    env_file:
      - .env
    environment:
      ENV_FILE_PATH: /.env
      SOLR_MODE: ${SOLR_MODE:-}
    networks:
      - solr_network
    restart: "no"

  # =================================
  # Main service
  # =================================
  solr:
    build:
      context: .
      dockerfile: Dockerfile.solr
      args:
        SOLR_VERSION: ${SOLR_VERSION:-9.10.1}
    image: solr-eledia:${SOLR_VERSION:-9.10.1}
    container_name: ${INSTANCE_NAME:-solr}-solr
    depends_on:
      solr-init:
        condition: service_completed_successfully
    ports:
      # SECURITY: SOLR_BIND MUST stay 127.0.0.1 — never bind to 0.0.0.0.
      # External access goes through the reverse proxy (nginx/apache) with TLS.
      - "${SOLR_BIND:-127.0.0.1}:${SOLR_PORT:-8983}:${SOLR_PORT:-8983}"
    # SolrCloud mode needs a short bootstrap after Solr starts: embedded
    # ZooKeeper is only available at runtime, but Cloud security must live in
    # ZK (/security.json), not only as /var/solr/data/security.json on disk.
    # The shell entrypoint uploads security.json to ZK before healthcheck turns
    # green. Standalone mode falls through to plain solr-foreground.
    command: ["/opt/solr/docker/scripts/solr-cloud-entrypoint.sh"]
    user: "8983:8983"
    volumes:
      - solr_data:/var/solr/data
      # Runtime helper scripts are baked into Dockerfile.solr at /opt/solr/scripts.
      # Keep tenants.env mounted as mutable tenant source-of-truth.
      - ./tenants.env:/opt/solr/tenants.env:z
      - ${SOLR_LOG_INSTANCES_ROOT:-/var/log/solr/instances}/${INSTANCE_NAME:-solr}-solr:/var/log/solr:z
    env_file:
      - .env
    environment:
      SOLR_HEAP: ${SOLR_HEAP:-2g}
      SOLR_LOG_LEVEL: ${SOLR_LOG_LEVEL:-INFO}
      # SolrCloud: set SOLR_MODE=solrcloud in .env — enables embedded ZooKeeper.
      # Leave empty (default) for standalone mode.
      SOLR_MODE: ${SOLR_MODE:-}
      # Enable Tika extraction module (Moodle file indexing via /update/extract)
      SOLR_MODULES: ${SOLR_MODULES:-extraction}
      # Optional Solr 9.10 hardening/ops toggles from .env
      SOLR_JETTY_GRACEFUL: ${SOLR_JETTY_GRACEFUL:-true}
      SOLR_LOGS_REQUESTLOG_ENABLED: ${SOLR_LOGS_REQUESTLOG_ENABLED:-false}
      # Disable usage analytics + explicit security defaults for 9.10
      SOLR_SECURITY_MANAGER_ENABLED: ${SOLR_SECURITY_MANAGER_ENABLED:-false}
      SOLR_OPTS: >-
        -XX:-UseLargePages
        -Dsolr.usage.analytics.enabled=false
        -Dsolr.responses.stacktrace.enabled=false
        -Dsolr.security.allow.urls.enabled=false
        ${SOLR_JAVA_OPTS:-}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '${SOLR_CPU_LIMIT:-2}'
          memory: ${SOLR_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${SOLR_CPU_RESERVATION:-0.5}'
          memory: ${SOLR_MEMORY_RESERVATION:-2G}
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          curl -sf -u "$${SOLR_ADMIN_USER}:$${SOLR_ADMIN_PASSWORD}"
          http://localhost:${SOLR_PORT:-8983}/solr/admin/info/system >/dev/null &&
          { [ "$${SOLR_MODE:-}" != "solrcloud" ] ||
          [ "$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${SOLR_PORT:-8983}/solr/admin/authentication)" = "401" ]; }
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

# =================================
# Volumes
# =================================
volumes:
  solr_data:
    name: solr_data_${INSTANCE_NAME:-solr}

# =================================
# Network
# =================================
networks:
  solr_network:
    name: ${INSTANCE_NAME:-solr}-network
    driver: bridge
