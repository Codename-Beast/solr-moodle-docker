services:
  # =================================
  # [SETUP] Generate .env
  # =================================
  moodle_setup:
    image: alpine:3.20
    profiles: ["setup"]
    container_name: ${INSTANCE_NAME:-solr}-setup
    working_dir: /app
    volumes:
      - ./init:/init:ro,z
      - ./:/app:z
    entrypoint: ["/bin/sh", "/init/generate_env.sh"]
    environment:
      INSTANCE_NAME: ${INSTANCE_NAME:-solr}
      SOLR_CORE_NAME: ${SOLR_CORE_NAME:-}
    restart: "no"

  # =================================
  # [BOOTSTRAP]
  # =================================
  solr-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: solr-init:v2.3
    container_name: ${INSTANCE_NAME:-solr}-init
    user: "0:0"
    volumes:
      - solr_data:/var/solr/data:z
      - ./.env:/.env:ro,z
    env_file:
      - .env
    environment:
      ENV_FILE_PATH: /.env
    networks:
      - solr_network
    restart: "no"
  # =================================
  # Main service
  # =================================
  solr:
    image: solr:${SOLR_VERSION:-9.10.1}
    container_name: ${INSTANCE_NAME:-solr}-solr
    depends_on:
      solr-init:
        condition: service_completed_successfully
    ports:
      # SECURITY: SOLR_BIND MUST stay 127.0.0.1 — never bind to 0.0.0.0.
      # External access goes through the reverse proxy (nginx/apache) with TLS.
      - "${SOLR_BIND:-127.0.0.1}:${SOLR_PORT:-8983}:${SOLR_PORT:-8983}"
    user: "8983:8983"
    volumes:
      - solr_data:/var/solr/data:z
    env_file:
      - .env
    environment:
      SOLR_HEAP: ${SOLR_HEAP:-2g}
      SOLR_LOG_LEVEL: ${SOLR_LOG_LEVEL:-INFO}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '${SOLR_CPU_LIMIT:-2}'
          memory: ${SOLR_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${SOLR_CPU_RESERVATION:-0.5}'
          memory: ${SOLR_MEMORY_RESERVATION:-2G}
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          curl -sf -u "$${SOLR_ADMIN_USER}:$${SOLR_ADMIN_PASSWORD}"
          http://localhost:${SOLR_PORT:-8983}/solr/admin/info/system || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  # =================================
  # [MONITORING] Solr Exporter
  # =================================
  solr-exporter:
    image: solr:${SOLR_VERSION:-9.10.1}
    profiles: ["monitoring"]
    container_name: ${INSTANCE_NAME:-solr}-exporter
    depends_on:
      solr:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-c"
      - >-
        /opt/solr/contrib/prometheus-exporter/bin/solr-exporter
        -p $${SOLR_METRICS_PORT:-9854}
        -b http://$${SOLR_ADMIN_USER}:$${SOLR_ADMIN_PASSWORD}@${INSTANCE_NAME:-solr}-solr:${SOLR_PORT:-8983}/solr
        -f /opt/solr/contrib/prometheus-exporter/conf/solr-exporter-config.xml
        -n 8
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:${SOLR_METRICS_PORT:-9854}:${SOLR_METRICS_PORT:-9854}"
    env_file:
      - .env
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =================================
  # [MONITORING] Prometheus
  # =================================
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    container_name: ${INSTANCE_NAME:-solr}-prometheus
    depends_on:
      - solr-exporter
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_config:/etc/prometheus:ro,z
      - prometheus_data:/prometheus:z
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.listen-address=0.0.0.0:9090"
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =================================
  # [MONITORING] Grafana
  # =================================
  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    container_name: ${INSTANCE_NAME:-solr}-grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana:z
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
    networks:
      - solr_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =================================
# Volumes
# =================================
volumes:
  solr_data:
    name: solr_data_${INSTANCE_NAME:-solr}
  prometheus_data:
    name: prometheus_data_${INSTANCE_NAME:-solr}
  prometheus_config:
    name: prometheus_config_${INSTANCE_NAME:-solr}
  grafana_data:
    name: grafana_data_${INSTANCE_NAME:-solr}

# =================================
# Network
# =================================
networks:
  solr_network:
    name: ${INSTANCE_NAME:-solr}-network
    driver: bridge
